                      stroke={confidence > 70 ? "var(--good)" : confidence > 40 ? "var(--warn)" : "var(--bad)"}
                      strokeWidth="6" strokeLinecap="round"
                      strokeDasharray={`${(confidence/100) * 213.6} 213.6`}/>
            </svg>
            <div className="ringval">{confidence}</div>
          </div>
          <div>
            <div style={{fontSize: 13, fontWeight: 600}}>{confidence > 70 ? "High confidence" : confidence > 40 ? "Moderate" : "Low confidence"}</div>
            <div className="muted" style={{fontSize: 12, marginTop: 3, lineHeight: 1.4}}>
              Inputs reconciled against linked Plaid balances · last sync 2 min ago
            </div>
          </div>
        </div>
      </div>

      <div className="card">

            <I.Warning size={14} style={{color:"var(--warn)", flexShrink: 0, marginTop: 2}}/>

            <I.Warning size={14} style={{color:"var(--warn)", flexShrink: 0, marginTop: 2}}/>

        amount={Math.max(0, Math.round(result.net))}

        emptyMsg="Net gain is negative — no snowflake to schedule."
      />
    </>
  );
}

function HustleRightPane({ sid, state, debts, snowflakes, scheduleSnowflake }) {
  const meta = STRATEGIES[sid];
  const r = calcHustle(sid, state);
  const isViable = r.net > 0;

  // months saved off payoff = monthly snowflake / typical interest savings ratio (rough)
  const monthsSaved = Math.round((r.net / 8400) * 11);

  return (

      />

  );
}

function ScheduleSnowflakeCard({ amount, isViable, debts, snowflakes, scheduleSnowflake, sourceLabel, emptyMsg, helperLine }) {
  // Default target = highest APR debt with a positive balance
  const eligible = (debts || []).filter(d => d.balance > 0);
  const defaultId = eligible.length
    ? [...eligible].sort((a, b) => b.apr - a.apr)[0].id
    : "";
  const [debtId, setDebtId] = useState(defaultId);
  const [scheduledId, setScheduledId] = useState(null);

  // Reset confirmation if user changes target after scheduling
  useEffect(() => { setScheduledId(null); }, [debtId, amount]);

  const target = eligible.find(d => d.id === debtId);
  const fireDate = new Date();
  fireDate.setMonth(fireDate.getMonth() + 1, 1);
  const dateStr = fireDate.toLocaleDateString("en-US", { month: "short", day: "numeric" });

  // Already scheduled? (for THIS source + this debt within the snowflake list)
  const alreadyScheduledHere = scheduledId && (snowflakes || []).some(s => s.id === scheduledId);

  if (!isViable) {
    return (
      <div className="card flat" style={{background:"var(--bg)", border:"1px dashed var(--line)"}}>
        <span className="h-eyebrow">Apply surplus to</span>
        <div className="muted" style={{fontSize: 12.5, marginTop: 8, lineHeight: 1.5}}>{emptyMsg}</div>
        <button className="btn" style={{marginTop: 12, width: "100%", justifyContent:"center"}} disabled>
          Strategy declined
        </button>
      </div>
    );
  }

  return (
    <div className="card flat" style={{background:"var(--bg)", border:"1px dashed var(--line)"}}>
      <span className="h-eyebrow">Apply surplus to</span>

      <div style={{marginTop: 10, display:"flex", flexDirection:"column", gap: 8}}>
        <select
          value={debtId}
          onChange={e => setDebtId(e.target.value)}
          style={{
            width: "100%",
            border: "1px solid var(--line)",
            background: "var(--surface)",
            color: "var(--ink)",
            borderRadius: 8,
            padding: "9px 10px",
            fontSize: 13,
            fontFamily: "inherit",
            appearance: "none",
            WebkitAppearance: "none",
            backgroundImage:
              "url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='none' stroke='%23999' stroke-width='1.4' d='M1 1l4 4 4-4'/></svg>\")",
            backgroundRepeat: "no-repeat",
            backgroundPosition: "right 10px center",
            paddingRight: 28,
            cursor: "pointer",
          }}
        >
          {eligible.length === 0 && <option value="">No debts to apply to</option>}
          {eligible.map(d => (
            <option key={d.id} value={d.id}>
              {d.name} · {d.apr.toFixed(2)}% APR · {fmtMoney(d.balance)}
            </option>
          ))}
        </select>

        {target && (
          <div className="row" style={{
            justifyContent: "space-between",
            padding: "8px 10px",
            background: "var(--surface)",
            border: "1px solid var(--line)",
            borderRadius: 8,
            fontSize: 12.5,
          }}>
            <span className="muted">Snowflake amount</span>
            <span className="tabular" style={{fontWeight: 600}}>{fmtMoney(amount)}</span>
          </div>
        )}

        <div className="muted" style={{fontSize: 12, lineHeight: 1.5}}>
          {target ? (
            <>
              Fires on <b style={{color:"var(--ink-2)"}}>{dateStr}</b> · routed to <b style={{color:"var(--ink-2)"}}>{target.name}</b>
              {helperLine ? <> · {helperLine}</> : null}
            </>
          ) : "Add a debt in Inventory first."}
        </div>
      </div>

      <button
        className={"btn " + (alreadyScheduledHere ? "" : "primary")}
        style={{marginTop: 12, width: "100%", justifyContent:"center"}}
        disabled={!target || alreadyScheduledHere}
        onClick={() => {
          if (!target) return;
          const id = scheduleSnowflake(target.id, amount, sourceLabel);
          if (id) setScheduledId(id);
        }}
      >
        {alreadyScheduledHere
          ? <><I.Check size={13}/> Scheduled · {dateStr}</>
          : <>Schedule snowflake</>}
      </button>
    </div>
  );
}

function KvRow({ label, value, bold, small }) {
  return (
    <div style={{display:"flex", justifyContent:"space-between", alignItems:"baseline", gap: 10}}>
      <span className="muted" style={{fontSize: small ? 11.5 : 12.5}}>{label}</span>
      <span className="tabular" style={{fontSize: bold ? 16 : small ? 12 : 13, fontWeight: bold ? 600 : 500, textAlign:"right"}}>{value}</span>
    </div>
  );
}

              <div className="tabular" style={{textAlign:"right", fontWeight: 500, color: a.balance < 0 ? "var(--bad)" : "var(--ink)"}}>
                {a.balance < 0 ? "−" : ""}{fmtMoney(Math.abs(a.balance))}
              </div>
              <div>
                <button className="btn ghost sm"><I.Settings size={14}/></button>
              </div>
            </div>
          ))}
        </div>
      </section>

      <section className="grid-2">
        <div className="card">
          <h2 className="h-section" style={{marginBottom: 10}}>Data health</h2>
          <div className="ring-wrap" style={{marginBottom: 16}}>
            <div className="ring">
              <svg viewBox="0 0 80 80">
                <circle cx="40" cy="40" r="34" fill="none" stroke="var(--line-2)" strokeWidth="6"/>
                <circle cx="40" cy="40" r="34" fill="none" stroke="var(--good)" strokeWidth="6" strokeLinecap="round" strokeDasharray={`${0.92 * 213.6} 213.6`}/>
              </svg>
              <div className="ringval">92</div>
            </div>
            <div>
              <div style={{fontSize: 13, fontWeight: 600}}>Confidence score</div>
              <div className="muted" style={{fontSize: 12, marginTop: 3, lineHeight: 1.4}}>
                Aggregated from connection freshness, balance reconciliation, and address verification.
              </div>
            </div>
          </div>
          <div className="col" style={{gap: 10, marginTop: 10}}>
            <CleaningRow ok msg="Address standardized" detail="Verified via Hillside, NJ municipal records"/>
            <CleaningRow ok msg="Outlier removed" detail="Adjusted $5/sqft rehab estimate to regional avg $45/sqft"/>
            <CleaningRow ok msg="Duplicate filtered" detail="Removed redundant balance from linked card"/>
            <CleaningRow warn msg="Manual override detected" detail="Capital Card balance overrides Plaid by −$120"/>
          </div>
        </div>

        <div className="card">
          <h2 className="h-section" style={{marginBottom: 14}}>Recent automations</h2>
          <div className="col" style={{gap: 0}}>
            <AutoRow icon={<I.Zap size={14}/>} title="Auto-pay confirmed" sub="Capital Card · $215.00" time="6 hr ago"/>
            <AutoRow icon={<I.Refresh size={14}/>} title="Balances refreshed" sub="6 of 6 institutions" time="2 hr ago"/>
            <AutoRow icon={<I.Bell size={14}/>} title="Due-date reminder" sub="Auto Loan due in 4 days" time="Yesterday"/>
            <AutoRow icon={<I.Trophy size={14}/>} title="Streak unlocked" sub="7-day on-time payments" time="2 days ago"/>
            {(snowflakes || []).slice().reverse().map(sf => (
              <AutoRow key={sf.id} icon={<I.Drop size={14}/>}
                       title="Snowflake queued"
                       sub={`${fmtMoney(sf.amount)} · ${sf.source} → ${sf.debtName}`}
                       time={new Date(sf.scheduledFor).toLocaleDateString("en-US", { month: "short", day: "numeric" })}/>
            ))}
            <AutoRow icon={<I.Drop size={14}/>} title="Snowflake applied" sub="$320 tax refund → Store Card" time="Mar 28"/>
          </div>
        </div>
      </section>
    </>
  );
}

function CleaningRow({ ok, warn, msg, detail }) {
  return (
    <div className="row" style={{gap: 10, alignItems:"flex-start"}}>
      <div style={{
        width: 18, height: 18, borderRadius: 50, display:"grid", placeItems:"center",
        background: ok ? "var(--good-soft)" : "var(--warn-soft)",
        color: ok ? "var(--good)" : "oklch(0.5 0.12 75)",
        fontSize: 10, fontWeight: 700, flexShrink: 0, marginTop: 1,
      }}>{ok ? "✓" : "!"}</div>
      <div>
        <div style={{fontSize: 12.5, fontWeight: 500}}>{msg}</div>
        <div className="muted" style={{fontSize: 11.5, marginTop: 1}}>{detail}</div>
      </div>
    </div>
  );
}

function AutoRow({ icon, title, sub, time }) {
  return (
    <div style={{display:"grid", gridTemplateColumns:"32px 1fr auto", gap: 10, padding: "10px 0", borderTop:"1px solid var(--line-2)", alignItems:"center"}}>
      <div style={{width: 28, height: 28, borderRadius: 8, background:"var(--accent-soft)", color:"var(--accent)", display:"grid", placeItems:"center"}}>
        {icon}
      </div>
      <div>
        <div style={{fontSize: 13, fontWeight: 500}}>{title}</div>
        <div className="muted" style={{fontSize: 11.5}}>{sub}</div>
      </div>
      <div className="muted" style={{fontSize: 11.5, fontFamily:"var(--font-mono)"}}>{time}</div>
    </div>
  );
}

function AccountsRightPane({}) {
  return (
    <>
      <div className="card tinted-good">
        <div className="row" style={{gap: 10, alignItems:"flex-start"}}>
          <I.Shield size={16} style={{color:"var(--good)"}}/>
          <div>
            <div style={{fontSize: 13, fontWeight: 600}}>Bank-grade encryption</div>
            <div className="muted" style={{fontSize: 12, marginTop: 4, color:"var(--ink-2)"}}>
              Read-only credentials, TLS 1.3 in transit, AES-256 at rest. We never see your password.
            </div>
          </div>
        </div>
      </div>

      <div className="card">
        <span className="h-eyebrow">Notifications</span>
        <div className="col" style={{gap: 10, marginTop: 12}}>
          <NotifRow label="Upcoming payments" on/>
          <NotifRow label="Balance over threshold" on/>
          <NotifRow label="Payoff victories" on/>
          <NotifRow label="Strategy re-rank" on={false}/>
          <NotifRow label="Weekly digest" on/>
        </div>
      </div>

      <div className="card">
        <span className="h-eyebrow">Webhooks listening</span>
        <ul style={{listStyle:"none", padding: 0, margin: "12px 0 0", display:"flex", flexDirection:"column", gap: 8, fontFamily:"var(--font-mono)", fontSize: 11.5}}>
          <li><span className="dot"/> NEW_ACCOUNTS_AVAILABLE</li>
          <li><span className="dot"/> LIABILITIES_UPDATE</li>
          <li><span className="dot"/> TRANSACTIONS_UPDATED</li>
          <li><span className="dot warn"/> ITEM_LOGIN_REQUIRED</li>
        </ul>
      </div>
    </>
  );
}

function NotifRow({ label, on }) {
  const [v, setV] = useState(on);
  return (
    <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", gap: 10, fontSize: 12.5, minHeight: 22}}>
      <span style={{flex: 1, minWidth: 0, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis"}}>{label}</span>
      <button onClick={() => setV(!v)} style={{
        appearance:"none", border:"none",
        width: 30, height: 17, borderRadius: 999, padding: 0, cursor: "pointer",
        background: v ? "var(--good)" : "var(--line)",
        position:"relative", transition:"background 0.15s",
        flexShrink: 0,
      }}>
        <i style={{
          position:"absolute", top: 2, left: v ? 15 : 2,
          width: 13, height: 13, borderRadius:"50%", background:"#fff",
          transition: "left 0.15s",
        }}/>
      </button>
    </div>
  );
}

Object.assign(window, { AccountsTab, AccountsRightPane });

</script>
<script type="text/babel" data-presets="env,react">
// app.jsx — main shell

const { useReducer } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#3a3aaa",
  "density": "regular",
  "dark": false,
  "strategy": "avalanche",
  "extraPay": 450,
  "showFlip": true,
  "tone": "coach"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [tab, setTab] = useState("roadmap");
  const [debts, setDebts] = useState(SAMPLE_DEBTS);
  const [accounts] = useState(SAMPLE_ACCOUNTS);
  const [badges, setBadges] = useState(BADGE_DEFS);
  const [streak, setStreak] = useState(7);
  const [logOpen, setLogOpen] = useState(false);
  const [addOpen, setAddOpen] = useState(false);
  const [toast, setToast] = useState(null);
  const [snowflakes, setSnowflakes] = useState([]);
  const [flipState, setFlipState] = useState({
    loanAmount: 42000, vestedBalance: 86400, loanRate: 8.5, termYears: 5, marketRate: 7,
    purchase: 185000, rehab: 38000, arv: 285000, holdMonths: 5,
    currentTax: 22, retireTax: 18,
  });
  const [simStrategy, setSimStrategy] = useState("flip");
  const [hustleState, setHustleState] = useState({
    rideshare: { hoursPerWeek: 14, hourlyGross: 24, milesPerHour: 18, platformCut: 25, weeksOn: 12 },
    delivery:  { hoursPerWeek: 12, deliveriesPerHour: 2.5, payPerDelivery: 7.5, milesPerDelivery: 3.5, weeksOn: 12 },
    freelance: { billableHours: 8, rate: 75, platformCut: 10, rampWeeks: 2, weeksOn: 12 },
    sell:      { items: 35, avgPrice: 28, sellThrough: 60, platform: 10, weeksOn: 6 },
  });
  const setHustle = (sid, k, v) => setHustleState(s => ({ ...s, [sid]: { ...s[sid], [k]: v }}));

  const setFlip = (k, v) => setFlipState(s => ({ ...s, [k]: v }));

  // sync tweaks → app state
  useEffect(() => {
    document.documentElement.style.setProperty("--accent", oklchFromHex(t.accent));
    document.documentElement.style.setProperty("--accent-2", oklchFromHex(t.accent, 0.62));
    document.documentElement.style.setProperty("--accent-soft", oklchSoftFromHex(t.accent));
    document.documentElement.dataset.theme = t.dark ? "dark" : "light";
    document.documentElement.dataset.density = t.density;
  }, [t.accent, t.dark, t.density]);

  const strategy = t.strategy;
  const setStrategy = (v) => setTweak("strategy", v);
  const extraPay = t.extraPay;
  const setExtraPay = (v) => setTweak("extraPay", v);

  const updateDebt = (id, patch) => setDebts(prev => prev.map(d => d.id === id ? { ...d, ...patch } : d));
  const removeDebt = (id) => setDebts(prev => prev.filter(d => d.id !== id));
  const addDebt = (d) => setDebts(prev => [...prev, { ...d, id: "d" + Math.random().toString(36).slice(2,8) }]);

  const logPayment = (debtId, amount) => {
    const d = debts.find(x => x.id === debtId);
    if (!d) return;
    const nextBal = Math.max(0, d.balance - amount);
    updateDebt(debtId, { balance: nextBal });
    setStreak(s => s + 1);
    setToast({ msg: `Logged ${fmtMoney(amount)} on ${d.name}`, kind: "ok" });
    setTimeout(() => setToast(null), 2400);
    if (nextBal === 0) {
      setBadges(prev => prev.map(b => b.id === "kill1" ? { ...b, achieved: true } : b));
      setTimeout(() => {
        setToast({ msg: `🏆 Knockout! ${d.name} closed forever.`, kind: "celebration" });
        setTimeout(() => setToast(null), 3000);
      }, 600);
    }
  };

  const scheduleSnowflake = (debtId, amount, sourceLabel) => {
    const d = debts.find(x => x.id === debtId);
    if (!d || amount <= 0) return;
    // Schedule for the 1st of next month, falling back to today + 14 days
    const now = new Date();
    const fire = new Date(now.getFullYear(), now.getMonth() + 1, 1);
    const id = "sf-" + Math.random().toString(36).slice(2, 8);
    setSnowflakes(prev => [...prev, {
      id, debtId, debtName: d.name, amount,
      source: sourceLabel || "Surplus",
      scheduledFor: fire.toISOString(),
      createdAt: now.toISOString(),
    }]);
    setBadges(prev => prev.map(b => b.id === "snow" ? { ...b, achieved: true } : b));
    const dateStr = fire.toLocaleDateString("en-US", { month: "short", day: "numeric" });
    setToast({ msg: `Snowflake queued · ${fmtMoney(amount)} → ${d.name} on ${dateStr}`, kind: "ok" });
    setTimeout(() => setToast(null), 2800);
    return id;
  };

  const renderTab = () => {
    switch (tab) {
      case "roadmap":
        return <RoadmapTab debts={debts} strategy={strategy} extraPay={extraPay}
                           setExtraPay={setExtraPay} logPayment={logPayment} openLog={() => setLogOpen(true)}/>;
      case "inventory":
        return <InventoryTab debts={debts} setDebts={setDebts} strategy={strategy} setStrategy={setStrategy}
                             openAdd={() => setAddOpen(true)} removeDebt={removeDebt} updateDebt={updateDebt}/>;
      case "simulator":
        return <SimulatorTab flipState={flipState} setFlip={setFlip}
                             simStrategy={simStrategy} setSimStrategy={setSimStrategy}
                             hustleState={hustleState} setHustle={setHustle}/>;
      case "accounts":
        return <AccountsTab accounts={accounts} lastSync="2 min ago" snowflakes={snowflakes}/>;
      default: return null;
    }
  };

  const renderRight = () => {
    switch (tab) {
      case "roadmap":
        return <RoadmapRightPane debts={debts} strategy={strategy} extraPay={extraPay}
                                 openLog={() => setLogOpen(true)} logPayment={logPayment}
                                 badges={badges} streak={streak}/>;
      case "inventory":
        return <InventoryRightPane debts={debts}/>;
      case "simulator":
        return <SimulatorRightPane flipState={flipState} simStrategy={simStrategy} hustleState={hustleState}
                                   debts={debts} snowflakes={snowflakes} scheduleSnowflake={scheduleSnowflake}/>;
      case "accounts":
        return <AccountsRightPane/>;
      default: return null;
    }
  };

  const navItems = [
    { id: "roadmap", label: "Roadmap", icon: <I.Roadmap size={15}/> },
    { id: "inventory", label: "Inventory", icon: <I.Inventory size={15}/>, badge: debts.length },
    { id: "simulator", label: "Simulator", icon: <I.Sim size={15}/>, badge: t.showFlip ? "5" : null },
    { id: "accounts", label: "Accounts", icon: <I.Accounts size={15}/> },
  ].filter(n => n.id !== "simulator" || t.showFlip);

  const tabLabels = { roadmap: "Roadmap", inventory: "Debt inventory", simulator: "Strategy simulator", accounts: "Accounts & data" };

  return (
    <div className="app" data-screen-label={tabLabels[tab]}>
      <aside className="sidebar">
        <div className="brand">
          <div className="brand-mark">T</div>
          <div className="brand-name">Throughline</div>
        </div>

        <div>
          <div className="nav-section">Workspace</div>
          {navItems.map(n => (
            <button key={n.id} className="nav-item" aria-current={tab === n.id ? "page" : undefined} onClick={() => setTab(n.id)}>
              <span className="ico">{n.icon}</span>
              <span>{n.label}</span>
              {n.badge != null && <span className="badge">{n.badge}</span>}
            </button>
          ))}
        </div>

        <div>
          <div className="nav-section">Activity</div>
          <button className="nav-item"><span className="ico"><I.Goals size={15}/></span><span>Goals</span></button>
          <button className="nav-item"><span className="ico"><I.Bell size={15}/></span><span>Notifications</span><span className="badge">3</span></button>
        </div>

        <div className="streak-card">
          <div className="row" style={{gap: 8, alignItems:"center"}}>
            <div style={{width: 22, height: 22, borderRadius: 6, background:"var(--warn-soft)", color:"var(--warn)", display:"grid", placeItems:"center"}}><I.Flame size={13}/></div>
            <span style={{fontSize: 11, letterSpacing:"0.06em", textTransform:"uppercase", color:"var(--ink-4)", fontWeight: 600}}>Streak</span>
          </div>
          <div className="num">{streak}<small style={{fontSize:14, color:"var(--ink-3)", marginLeft:4}}>wks</small></div>
          <div className="lbl">{12 - streak} until next badge</div>
          <div className="streak-dots">
            {Array.from({length: 12}).map((_,i) => <i key={i} className={i < streak ? "on" : i === streak ? "today" : ""}/>)}
          </div>
        </div>
      </aside>

      <main className="main">
        <div className="topbar">
          <div className="crumbs">
            <span>Workspace</span> <span>›</span> <strong>{tabLabels[tab]}</strong>
          </div>
          <div className="grow"/>
          <div className="search">
            <I.Search size={13}/>
            <span>Search debts, accounts…</span>
            <kbd>⌘K</kbd>
          </div>
          <button className="btn"><I.Refresh size={14}/> Sync</button>
          <button className="btn primary" onClick={() => setLogOpen(true)}><I.Plus size={14}/> Log payment</button>
          <div className="avatar">JM</div>
        </div>

        <div className="page">
          <div className="canvas">
            <PageHeader tab={tab} debts={debts} streak={streak} tone={t.tone}/>
            {renderTab()}
          </div>
          <aside className="rightpane">
            {renderRight()}
          </aside>
        </div>
      </main>

      {logOpen && <LogModal debts={debts} onClose={() => setLogOpen(false)} onSave={(id, amt) => { logPayment(id, amt); setLogOpen(false); }}/>}
      {addOpen && <AddDebtModal onClose={() => setAddOpen(false)} onSave={(d) => { addDebt(d); setAddOpen(false); }}/>}
      {toast && <Toast msg={toast.msg} kind={toast.kind}/>}

      <TweaksPanel title="Tweaks">
        <TweakSection label="Theme"/>
        <TweakColor label="Accent" value={t.accent} onChange={v => setTweak("accent", v)}/>
        <TweakToggle label="Dark mode" value={t.dark} onChange={v => setTweak("dark", v)}/>
        <TweakRadio label="Density" value={t.density} options={["compact","regular","comfortable"]} onChange={v => setTweak("density", v)}/>

        <TweakSection label="Strategy"/>
        <TweakRadio label="Method" value={t.strategy}
                    options={[{value:"snowball",label:"Snow"},{value:"avalanche",label:"Aval"},{value:"custom",label:"Custom"}]}
                    onChange={v => setTweak("strategy", v)}/>
        <TweakSlider label="Extra / month" value={t.extraPay} min={0} max={2000} step={25} unit="$" onChange={v => setTweak("extraPay", v)}/>

        <TweakSection label="Modules"/>
        <TweakToggle label="Strategy simulator" value={t.showFlip} onChange={v => { setTweak("showFlip", v); if (!v && tab === "simulator") setTab("roadmap"); }}/>

        <TweakSection label="Voice"/>
        <TweakRadio label="Tone" value={t.tone} options={[{value:"coach",label:"Coach"},{value:"calm",label:"Calm"},{value:"game",label:"Boss"},{value:"dry",label:"Dry"}]} onChange={v => setTweak("tone", v)}/>
      </TweaksPanel>
    </div>
  );
}

function PageHeader({ tab, debts, streak, tone }) {
  const balance = debts.reduce((s,d)=>s+d.balance, 0);
  const lines = {
    roadmap: {
      coach:  { eyebrow: "Tuesday · April 25", title: <>You're on pace.<br/><span style={{color:"var(--ink-3)"}}>Three years and counting until zero.</span></> },
      calm:   { eyebrow: "Today · April 25", title: <>Your roadmap to zero.<br/><span style={{color:"var(--ink-3)"}}>Calm, deliberate, on schedule.</span></> },
      game:   { eyebrow: "Mission control", title: <>5 bosses remaining.<br/><span style={{color:"var(--ink-3)"}}>Capital Card is on the ropes.</span></> },
      dry:    { eyebrow: "Overview", title: <>Debt roadmap.<br/><span style={{color:"var(--ink-3)"}}>{fmtMoney(balance)} across 5 accounts.</span></> },
    },
    inventory: {
      coach:  { eyebrow: "Inventory", title: <>Every debt, in one place.<br/><span style={{color:"var(--ink-3)"}}>Pick a strategy and let the math sort it.</span></> },
      calm:   { eyebrow: "Inventory", title: <>The full picture.<br/><span style={{color:"var(--ink-3)"}}>Five accounts. One plan.</span></> },
      game:   { eyebrow: "Lineup", title: <>The boss list.<br/><span style={{color:"var(--ink-3)"}}>Rank them however you'll defeat them.</span></> },
      dry:    { eyebrow: "Liabilities", title: <>Active liabilities.<br/><span style={{color:"var(--ink-3)"}}>Sortable, editable, drag-rankable.</span></> },
    },
    simulator: {
      coach:  { eyebrow: "Strategy sandbox", title: <>Pick a path to extra cash.<br/><span style={{color:"var(--ink-3)"}}>Five strategies, one math engine.</span></> },
      calm:   { eyebrow: "Strategy sandbox", title: <>The hypothetical.<br/><span style={{color:"var(--ink-3)"}}>Stress-test before you commit.</span></> },
      game:   { eyebrow: "Power-up", title: <>Choose your weapon.<br/><span style={{color:"var(--ink-3)"}}>Flip, drive, deliver, freelance, sell.</span></> },
      dry:    { eyebrow: "Simulator", title: <>Strategy simulator.<br/><span style={{color:"var(--ink-3)"}}>Net cash modeling for 5 income strategies.</span></> },
    },
    accounts: {
      coach:  { eyebrow: "Connections", title: <>The numbers, fresh.<br/><span style={{color:"var(--ink-3)"}}>Pulled live from every connected institution.</span></> },
      calm:   { eyebrow: "Connections", title: <>Connected accounts.<br/><span style={{color:"var(--ink-3)"}}>Synced and reconciled.</span></> },
      game:   { eyebrow: "Inventory", title: <>The arsenal.<br/><span style={{color:"var(--ink-3)"}}>Every account in your kit.</span></> },
      dry:    { eyebrow: "Connections", title: <>Linked accounts.<br/><span style={{color:"var(--ink-3)"}}>Read-only, encrypted, refreshed daily.</span></> },
    },
  };
  const set = lines[tab] || lines.roadmap;
  const v = set[tone] || set.coach;
  return (
    <div style={{margin: "8px 0 4px"}}>
      <div className="h-eyebrow" style={{marginBottom: 8}}>{v.eyebrow}</div>
      <h1 className="h-display">{v.title}</h1>
    </div>
  );
}

function LogModal({ debts, onClose, onSave }) {
  const [debtId, setDebtId] = useState(debts[0].id);
  const [amount, setAmount] = useState(250);
  const d = debts.find(x => x.id === debtId);
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <h3>Log a payment</h3>
        <div className="form-row">
          <label>Debt</label>
          <select value={debtId} onChange={e => setDebtId(e.target.value)}>
            {debts.map(d => <option key={d.id} value={d.id}>{d.name} · {fmtMoney(d.balance)}</option>)}
          </select>
        </div>
        <div className="form-row">
          <label>Amount</label>
          <input type="number" value={amount} onChange={e => setAmount(Number(e.target.value) || 0)}/>
        </div>
        <div className="row" style={{gap: 8, marginTop: 8, flexWrap: "wrap"}}>
          {[d?.min, 250, 500, 1000].map((v,i) => (
            <button key={i} className="btn sm" onClick={() => setAmount(v)}>{fmtMoney(v)}</button>
          ))}
        </div>
        <div className="row" style={{justifyContent:"flex-end", gap: 8, marginTop: 24}}>
          <button className="btn" onClick={onClose}>Cancel</button>
          <button className="btn primary" onClick={() => onSave(debtId, amount)}><I.Check size={14}/> Log payment</button>
        </div>
      </div>
    </div>
  );
}

function AddDebtModal({ onClose, onSave }) {
  const [form, setForm] = useState({ name: "", kind: "Credit Card", balance: 0, apr: 19.99, min: 50,
                                       color: "oklch(0.55 0.15 320)", initials: "??" });
  const update = (k, v) => setForm(f => ({ ...f, [k]: v, initials: k === "name" ? v.slice(0,2).toUpperCase() : f.initials }));
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <h3>Add a debt</h3>
        <div className="form-row">
          <label>Creditor name</label>
          <input value={form.name} placeholder="e.g. Northbridge MasterCard" onChange={e => update("name", e.target.value)}/>
        </div>
        <div className="grid-2">
          <div className="form-row">
            <label>Type</label>
            <select value={form.kind} onChange={e => update("kind", e.target.value)}>
              <option>Credit Card</option><option>Auto</option><option>Student</option>
              <option>Personal</option><option>Mortgage</option><option>Other</option>
            </select>
          </div>
          <div className="form-row">
            <label>APR (%)</label>
            <input type="number" step="0.01" value={form.apr} onChange={e => update("apr", Number(e.target.value))}/>
          </div>
        </div>
        <div className="grid-2">
          <div className="form-row">
            <label>Balance</label>
            <input type="number" value={form.balance} onChange={e => update("balance", Number(e.target.value))}/>
          </div>
          <div className="form-row">
            <label>Min payment</label>
            <input type="number" value={form.min} onChange={e => update("min", Number(e.target.value))}/>
          </div>
        </div>
        <div className="row" style={{justifyContent:"flex-end", gap: 8, marginTop: 12}}>
          <button className="btn" onClick={onClose}>Cancel</button>
          <button className="btn primary" disabled={!form.name} onClick={() => onSave(form)}><I.Plus size={14}/> Add</button>
        </div>
      </div>
    </div>
  );
}

function Toast({ msg, kind }) {
  return <div className="toast"><span className="ok-dot"/>{msg}</div>;
}

// ── color helpers ──
function oklchFromHex(hex, l) {
  // approximate hex→oklch mapping (we accept hex from color picker, give a flat fallback)
  const { r, g, b } = hexToRgb(hex);
  const [L, a, B] = rgbToOklab(r, g, b);
  const c = Math.sqrt(a*a + B*B);
  let h = Math.atan2(B, a) * 180 / Math.PI; if (h < 0) h += 360;
  return `oklch(${(l ?? L).toFixed(3)} ${c.toFixed(3)} ${h.toFixed(1)})`;
}
function oklchSoftFromHex(hex) {
  const { r, g, b } = hexToRgb(hex);
  const [L, a, B] = rgbToOklab(r, g, b);
  const c = Math.sqrt(a*a + B*B);
  let h = Math.atan2(B, a) * 180 / Math.PI; if (h < 0) h += 360;
  return `oklch(0.94 ${(c * 0.4).toFixed(3)} ${h.toFixed(1)})`;
}
function hexToRgb(hex) {
  const m = hex.replace("#","");
  const v = m.length === 3 ? m.split("").map(c=>c+c).join("") : m;
  return { r: parseInt(v.slice(0,2),16)/255, g: parseInt(v.slice(2,4),16)/255, b: parseInt(v.slice(4,6),16)/255 };
}
function rgbToOklab(r,g,b) {
  const f = (c) => c <= 0.04045 ? c/12.92 : Math.pow((c+0.055)/1.055, 2.4);
  r=f(r); g=f(g); b=f(b);
  const l = 0.4122214708*r + 0.5363325363*g + 0.0514459929*b;
  const m = 0.2119034982*r + 0.6806995451*g + 0.1073969566*b;
  const s = 0.0883024619*r + 0.2817188376*g + 0.6299787005*b;
  const l_ = Math.cbrt(l), m_ = Math.cbrt(m), s_ = Math.cbrt(s);
  return [
    0.2104542553*l_ + 0.7936177850*m_ - 0.0040720468*s_,
    1.9779984951*l_ - 2.4285922050*m_ + 0.4505937099*s_,
    0.0259040371*l_ + 0.7827717662*m_ - 0.8086757660*s_,
  ];
}
