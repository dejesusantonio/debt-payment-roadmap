<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1440">
<title>Throughline — Debt Payoff Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=JetBrains+Mono:wght@400;500&display=swap">
<style>/* Throughline — Debt Payoff Platform */
:root {
  --bg: oklch(0.985 0.004 85);
  --bg-2: oklch(0.965 0.006 85);
  --surface: #ffffff;
  --surface-2: oklch(0.975 0.005 85);
  --ink: oklch(0.18 0.01 80);
  --ink-2: oklch(0.32 0.01 80);
  --ink-3: oklch(0.5 0.01 80);
  --ink-4: oklch(0.68 0.008 80);
  --line: oklch(0.9 0.006 85);
  --line-2: oklch(0.93 0.005 85);

  --accent: oklch(0.42 0.13 268);     /* deep indigo */
  --accent-2: oklch(0.62 0.13 268);
  --accent-soft: oklch(0.94 0.04 268);

  --good: oklch(0.58 0.11 155);       /* muted green */
  --good-soft: oklch(0.94 0.04 155);
  --warn: oklch(0.72 0.13 75);        /* amber */
  --warn-soft: oklch(0.95 0.05 75);
  --bad:  oklch(0.55 0.18 25);        /* red */
  --bad-soft: oklch(0.95 0.04 25);

  --radius: 14px;
  --radius-sm: 8px;
  --shadow-sm: 0 1px 0 oklch(1 0 0 / 0.6) inset, 0 1px 2px oklch(0 0 0 / 0.04);
  --shadow-md: 0 1px 0 oklch(1 0 0 / 0.6) inset, 0 4px 16px oklch(0 0 0 / 0.06);

  --pad: 20px;
  --gap: 14px;

  --font-sans: "Geist", ui-sans-serif, system-ui, -apple-system, "Helvetica Neue", sans-serif;
  --font-serif: "Newsreader", "Georgia", "Times New Roman", serif;
  --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
}

[data-theme="dark"] {
  --bg: oklch(0.18 0.012 270);
  --bg-2: oklch(0.22 0.012 270);
  --surface: oklch(0.24 0.014 270);
  --surface-2: oklch(0.27 0.014 270);
  --ink: oklch(0.97 0.005 90);
  --ink-2: oklch(0.86 0.006 90);
  --ink-3: oklch(0.7 0.008 90);
  --ink-4: oklch(0.55 0.008 90);
  --line: oklch(0.32 0.012 270);
  --line-2: oklch(0.3 0.012 270);
  --accent: oklch(0.72 0.13 268);
  --accent-2: oklch(0.82 0.1 268);
  --accent-soft: oklch(0.32 0.08 268);
  --good-soft: oklch(0.28 0.06 155);
  --warn-soft: oklch(0.3 0.08 75);
  --bad-soft: oklch(0.3 0.1 25);
  --shadow-sm: 0 1px 0 oklch(1 0 0 / 0.04) inset, 0 1px 2px oklch(0 0 0 / 0.3);
  --shadow-md: 0 1px 0 oklch(1 0 0 / 0.04) inset, 0 6px 24px oklch(0 0 0 / 0.4);
}

[data-density="compact"] { --pad: 14px; --gap: 10px; }
[data-density="comfortable"] { --pad: 24px; --gap: 18px; }

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  font-feature-settings: "ss01", "cv11";
}

/* App shell */
.app {
  display: grid;
  grid-template-columns: 232px 1fr;
  min-height: 100vh;
}
.sidebar {
  border-right: 1px solid var(--line);
  background: var(--bg-2);
  padding: 22px 14px;
  position: sticky;
  top: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  gap: 18px;
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 4px 6px 6px;
}
.brand-mark {
  width: 26px; height: 26px;
  border-radius: 7px;
  background: var(--ink);
  color: var(--bg);
  display: grid; place-items: center;
  font-family: var(--font-serif);
  font-style: italic;
  font-size: 17px;
  font-weight: 500;
  letter-spacing: -0.02em;
}
.brand-name {
  font-family: var(--font-serif);
  font-size: 19px;
  letter-spacing: -0.01em;
  font-weight: 500;
}
.nav-section {
  font-size: 10.5px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-4);
  padding: 4px 8px;
  font-weight: 600;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 9px;
  border-radius: 8px;
  cursor: pointer;
  color: var(--ink-2);
  font-weight: 500;
  font-size: 13.5px;
  user-select: none;
  border: none;
  background: transparent;
  width: 100%;
  text-align: left;
  font-family: inherit;
}
.nav-item:hover { background: var(--line-2); color: var(--ink); }
.nav-item[aria-current="page"] {
  background: var(--ink);
  color: var(--bg);
}
[data-theme="dark"] .nav-item[aria-current="page"] {
  background: var(--accent-soft);
  color: var(--ink);
}
.nav-item .ico { width: 16px; display: inline-flex; }
.nav-item .badge {
  margin-left: auto;
  font-size: 10.5px;
  padding: 1px 6px;
  border-radius: 999px;
  background: var(--accent-soft);
  color: var(--accent);
  font-variant-numeric: tabular-nums;
}
.nav-item[aria-current="page"] .badge { background: oklch(1 0 0 / 0.18); color: inherit; }

.streak-card {
  margin-top: auto;
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: 12px;
  background: var(--surface);
}
.streak-card .num {
  font-family: var(--font-serif);
  font-size: 32px;
  line-height: 1;
  letter-spacing: -0.02em;
}
.streak-card .lbl {
  color: var(--ink-3);
  font-size: 12px;
  margin-top: 2px;
}
.streak-dots {
  display: flex; gap: 4px;
  margin-top: 10px;
}
.streak-dots i {
  width: 10px; height: 10px; border-radius: 3px;
  background: var(--line);
  display: block;
}
.streak-dots i.on { background: var(--good); }
.streak-dots i.today { background: var(--ink); outline: 2px solid var(--bg-2); }

/* Main */
.main { display: flex; flex-direction: column; min-width: 0; }
.topbar {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 28px;
  border-bottom: 1px solid var(--line);
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 4;
}
.crumbs {
  font-size: 12.5px;
  color: var(--ink-3);
  display: flex; align-items: center; gap: 8px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex-shrink: 1;
  min-width: 0;
}
.crumbs strong { color: var(--ink); font-weight: 500; white-space: nowrap; }
.topbar .grow { flex: 1; }
.search {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface-2);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 6px 10px;
  width: 220px;
  color: var(--ink-3);
  font-size: 12.5px;
  white-space: nowrap;
  flex-shrink: 0;
  overflow: hidden;
}
.search > span { overflow: hidden; text-overflow: ellipsis; }
.search kbd {
  font-family: var(--font-mono);
  font-size: 10.5px;
  padding: 1px 5px;
  border-radius: 4px;
  background: var(--bg);
  border: 1px solid var(--line);
  margin-left: auto;
}
.btn {
  appearance: none;
  border: 1px solid var(--line);
  background: var(--surface);
  color: var(--ink);
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  padding: 7px 12px;
  border-radius: 8px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  flex-shrink: 0;
}
.btn:hover { background: var(--surface-2); }
.btn.primary {
  background: var(--ink);
  color: var(--bg);
  border-color: var(--ink);
}
.btn.primary:hover { background: var(--ink-2); }
.btn.ghost { border-color: transparent; background: transparent; color: var(--ink-2); }
.btn.ghost:hover { background: var(--line-2); color: var(--ink); }
.btn.danger { color: var(--bad); border-color: var(--line); }
.btn.danger:hover { background: var(--bad-soft); }
.btn.sm { padding: 4px 9px; font-size: 12px; border-radius: 6px; }
.btn.lg { padding: 10px 16px; font-size: 14px; }

.avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--accent-soft);
  color: var(--accent);
  display: grid; place-items: center;
  font-weight: 600;
  font-size: 11.5px;
}

/* Page layout */
.page {
  display: grid;
  grid-template-columns: 1fr 320px;
  gap: 0;
  min-height: 0;
  flex: 1;
}
.canvas {
  padding: var(--pad) 28px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: var(--gap);
}
.rightpane {
  border-left: 1px solid var(--line);
  background: var(--bg-2);
  padding: var(--pad);
  display: flex;
  flex-direction: column;
  gap: var(--gap);
  overflow-y: auto;
}

/* Headings */
.h-eyebrow {
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-4);
  font-weight: 600;
}
.h-display {
  font-family: var(--font-serif);
  font-size: 42px;
  line-height: 1.04;
  letter-spacing: -0.02em;
  font-weight: 400;
  margin: 0;
  text-wrap: pretty;
}
.h-section {
  font-family: var(--font-serif);
  font-size: 22px;
  letter-spacing: -0.01em;
  font-weight: 500;
  margin: 0;
}
.h-card {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: -0.005em;
  margin: 0;
  color: var(--ink);
}
.muted { color: var(--ink-3); }
.tabular { font-variant-numeric: tabular-nums; font-family: var(--font-mono); }
.serif { font-family: var(--font-serif); }

/* Card */
.card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  padding: var(--pad);
}
.card.flat { box-shadow: none; }
.card.tinted-warn { background: var(--warn-soft); border-color: oklch(from var(--warn) l c h / 0.4); }
.card.tinted-bad { background: var(--bad-soft); border-color: oklch(from var(--bad) l c h / 0.4); }
.card.tinted-good { background: var(--good-soft); border-color: oklch(from var(--good) l c h / 0.4); }
.card.tinted-accent { background: var(--accent-soft); border-color: oklch(from var(--accent) l c h / 0.3); }
.card.dark {
  background: var(--ink);
  color: var(--bg);
  border: none;
}
.card.dark .muted { color: oklch(1 0 0 / 0.55); }
.card.dark .h-card { color: var(--bg); }

.row { display: flex; align-items: center; gap: 10px; }
.col { display: flex; flex-direction: column; gap: 8px; }
.between { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
.between > * { min-width: 0; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--gap); }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--gap); }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--gap); }

/* Hero KPI */
.hero {
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 0;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--surface);
}
.hero-l {
  padding: 28px var(--pad);
  background: var(--ink);
  color: var(--bg);
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.hero-l .eye { color: oklch(1 0 0 / 0.5); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 600; }
.hero-l .num {
  font-family: var(--font-serif);
  font-size: 64px;
  line-height: 1;
  letter-spacing: -0.025em;
  font-weight: 400;
}
.hero-l .num small { font-size: 28px; color: oklch(1 0 0 / 0.55); margin-left: 2px; }
.hero-l .delta {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12.5px;
  color: oklch(0.85 0.12 155);
  background: oklch(0.85 0.12 155 / 0.12);
  padding: 3px 8px;
  border-radius: 999px;
  align-self: flex-start;
  font-variant-numeric: tabular-nums;
}
.hero-r {
  padding: 22px var(--pad);
  display: grid;
  gap: 16px;
  align-content: center;
}
.kpi {
  display: flex; flex-direction: column; gap: 4px;
}
.kpi .lbl { font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-4); font-weight: 600; }
.kpi .val { font-family: var(--font-serif); font-size: 26px; letter-spacing: -0.02em; line-height: 1.1; }
.kpi .sub { font-size: 12px; color: var(--ink-3); font-variant-numeric: tabular-nums; }

/* Tabs (sub-nav inside main) */
.subtabs {
  display: flex;
  gap: 2px;
  padding: 2px;
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: 10px;
  width: fit-content;
}
.subtab {
  appearance: none;
  border: none;
  background: transparent;
  color: var(--ink-3);
  font: inherit;
  font-weight: 500;
  font-size: 12.5px;
  padding: 6px 12px;
  border-radius: 7px;
  cursor: pointer;
  font-family: inherit;
}
.subtab[aria-current="true"] {
  background: var(--surface);
  color: var(--ink);
  box-shadow: var(--shadow-sm);
}

/* Roadmap timeline */
.timeline {
  position: relative;
  display: grid;
  grid-template-columns: 1fr;
  gap: 0;
}
.timeline-axis {
  position: relative;
  height: 36px;
  display: flex;
  align-items: center;
  border-bottom: 1px dashed var(--line);
  margin-bottom: 8px;
}
.timeline-axis .tick {
  flex: 1;
  font-size: 11px;
  color: var(--ink-4);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  font-weight: 600;
  border-left: 1px solid var(--line);
  padding-left: 6px;
}
.timeline-axis .tick:first-child { border-left: none; }
.tl-row {
  display: grid;
  grid-template-columns: 180px 1fr 110px;
  align-items: center;
  gap: 14px;
  padding: 10px 0;
  border-top: 1px solid var(--line-2);
}
.tl-row:first-of-type { border-top: none; }
.tl-row .name { font-weight: 500; display: flex; align-items: center; gap: 8px; }
.tl-row .name .swatch { width: 8px; height: 8px; border-radius: 2px; background: var(--accent); }
.tl-row .name .meta { font-size: 11px; color: var(--ink-4); margin-left: auto; font-variant-numeric: tabular-nums; }
.tl-bar {
  position: relative;
  height: 14px;
  background: var(--line-2);
  border-radius: 4px;
  overflow: hidden;
}
.tl-bar .fill {
  position: absolute;
  inset: 0 auto 0 0;
  background: var(--accent);
  border-radius: 4px;
  transition: width 0.4s ease;
}
.tl-bar .target {
  position: absolute;
  top: -2px; bottom: -2px;
  width: 2px;
  background: var(--ink);
}
.tl-bar.is-target .fill { background: linear-gradient(90deg, var(--accent), var(--accent-2)); }
.tl-pay {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--ink-3);
  text-align: right;
  font-variant-numeric: tabular-nums;
}

/* Table */
.tbl {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: 13px;
}
.tbl th {
  text-align: left;
  font-weight: 600;
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ink-4);
  padding: 8px 12px;
  border-bottom: 1px solid var(--line);
  background: var(--bg-2);
  position: sticky;
  top: 0;
}
.tbl td {
  padding: 12px;
  border-bottom: 1px solid var(--line-2);
  vertical-align: middle;
}
.tbl tr:last-child td { border-bottom: none; }
.tbl tr.target-row { background: oklch(from var(--accent) l c h / 0.04); }
.tbl tr.dragging { opacity: 0.4; }
.tbl tr.drag-over td { box-shadow: inset 0 2px 0 var(--accent); }
.tbl .creditor { display: flex; align-items: center; gap: 10px; }
.tbl .swatch-icon {
  width: 28px; height: 28px;
  border-radius: 7px;
  display: grid; place-items: center;
  font-size: 11.5px;
  font-weight: 600;
  background: var(--accent-soft);
  color: var(--accent);
  flex-shrink: 0;
}
.tbl .num { font-family: var(--font-mono); font-variant-numeric: tabular-nums; text-align: right; }
.tbl .pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  padding: 2px 7px;
  border-radius: 999px;
  background: var(--bg-2);
  color: var(--ink-3);
  font-weight: 500;
}
.tbl .pill.target { background: var(--accent); color: var(--bg); }
.tbl .pill.warn { background: var(--warn-soft); color: oklch(0.4 0.12 75); }
.tbl .grip { color: var(--ink-4); cursor: grab; user-select: none; }
.tbl .grip:active { cursor: grabbing; }
.tbl input.cell-input {
  border: none;
  background: transparent;
  font: inherit;
  font-family: var(--font-mono);
  font-variant-numeric: tabular-nums;
  width: 100%;
  text-align: right;
  color: var(--ink);
  padding: 4px 0;
  border-radius: 4px;
}
.tbl input.cell-input:focus {
  outline: 1px solid var(--accent);
  background: var(--accent-soft);
  padding: 4px 6px;
  margin: 0 -6px;
}

/* Right pane elements */
.target-card .now {
  font-family: var(--font-serif);
  font-size: 28px;
  letter-spacing: -0.02em;
}
.gauge {
  position: relative;
  height: 8px;
  background: var(--line-2);
  border-radius: 999px;
  overflow: hidden;
}
.gauge .fill {
  position: absolute; inset: 0 auto 0 0;
  background: var(--accent);
  border-radius: 999px;
  transition: width 0.5s ease;
}

/* What-If slider */
.whatif {
  padding: var(--pad);
}
.whatif input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 4px;
  background: var(--line);
  border-radius: 999px;
  margin: 12px 0 4px;
}
.whatif input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--ink);
  border: 4px solid var(--bg);
  box-shadow: 0 0 0 1px var(--ink);
  cursor: pointer;
}
.whatif input[type="range"]::-moz-range-thumb {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--ink);
  border: 4px solid var(--bg);
  box-shadow: 0 0 0 1px var(--ink);
  cursor: pointer;
}
.whatif .scale {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--ink-4);
  font-variant-numeric: tabular-nums;
}

/* Comparison chart */
.chart {
  position: relative;
  height: 220px;
  width: 100%;
}
.chart svg { width: 100%; height: 100%; display: block; }
.legend { display: flex; gap: 16px; font-size: 12px; color: var(--ink-3); }
.legend i { display: inline-block; width: 10px; height: 10px; border-radius: 2px; vertical-align: middle; margin-right: 6px; }

/* Badges grid */
.badges {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.badge-card {
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 10px;
  background: var(--surface);
  display: flex;
  flex-direction: column;
  gap: 4px;
  align-items: center;
  text-align: center;
}
.badge-card.locked { opacity: 0.42; filter: grayscale(0.7); }
.badge-card .ico-lg {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--accent-soft);
  color: var(--accent);
  display: grid; place-items: center;
  margin-bottom: 4px;
}
.badge-card .nm { font-size: 11.5px; font-weight: 600; line-height: 1.2; }
.badge-card .ds { font-size: 10.5px; color: var(--ink-4); line-height: 1.2; }

/* Risk cards */
.risk-card {
  border-radius: 12px;
  padding: 14px;
  border: 1px solid;
  display: flex;
  gap: 12px;
  align-items: flex-start;
}
.risk-card .ind {
  width: 28px; height: 28px;
  border-radius: 8px;
  display: grid; place-items: center;
  flex-shrink: 0;
  font-weight: 700;
  font-size: 14px;
}
.risk-card.bad { background: var(--bad-soft); border-color: oklch(from var(--bad) l c h / 0.35); }
.risk-card.bad .ind { background: var(--bad); color: var(--bg); }
.risk-card.warn { background: var(--warn-soft); border-color: oklch(from var(--warn) l c h / 0.35); }
.risk-card.warn .ind { background: var(--warn); color: var(--bg); }
.risk-card.ok { background: var(--good-soft); border-color: oklch(from var(--good) l c h / 0.35); }
.risk-card.ok .ind { background: var(--good); color: var(--bg); }
.risk-card > div { min-width: 0; }
.risk-card .ttl { font-weight: 600; font-size: 13px; line-height: 1.35; display: block; }
.risk-card .desc { font-size: 12.5px; color: var(--ink-2); margin-top: 6px; line-height: 1.5; display: block; }
.risk-card .muted { display: block; margin-top: 8px !important; line-height: 1.5; }

/* Strategy chips */
.strategy-chips { margin-bottom: 0; }
.chip-rail {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
}
.strat-chip {
  appearance: none;
  text-align: left;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 12px 12px 11px;
  cursor: pointer;
  font-family: inherit;
  color: var(--ink);
  transition: border-color 0.12s, background 0.12s, transform 0.06s;
  display: flex; flex-direction: column; gap: 6px;
  min-width: 0;
}
.strat-chip:hover { border-color: var(--ink-4); }
.strat-chip:active { transform: translateY(1px); }
.strat-chip.active {
  border-color: var(--accent);
  background: var(--accent-soft);
  box-shadow: 0 0 0 3px oklch(from var(--accent) l c h / 0.12);
}
.strat-chip-head {
  display: flex; justify-content: space-between; align-items: center;
}
.strat-chip-icon {
  width: 26px; height: 26px;
  border-radius: 7px;
  background: var(--bg-2);
  display: grid; place-items: center;
  color: var(--ink-2);
}
.strat-chip.active .strat-chip-icon { background: var(--surface); color: var(--accent); }
.strat-chip-risk {
  font-size: 9.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 3px 6px;
  border-radius: 4px;
  white-space: nowrap;
}
.strat-chip-risk.risk-high     { background: var(--bad-soft); color: var(--bad); }
.strat-chip-risk.risk-low      { background: var(--good-soft); color: var(--good); }
.strat-chip-risk.risk-minimal  { background: var(--bg-2); color: var(--ink-3); }
.strat-chip-name {
  font-size: 13.5px;
  font-weight: 600;
  letter-spacing: -0.01em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.strat-chip-meta {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px;
  color: var(--ink-3);
  white-space: nowrap;
  overflow: hidden;
}
.strat-chip-meta .tabular { color: var(--ink-2); font-weight: 500; }

/* Connected accounts */
.acct-row {
  display: grid;
  grid-template-columns: 36px 1.4fr 1fr 1fr auto;
  align-items: center;
  gap: 12px;
  padding: 12px 0;
  border-top: 1px solid var(--line-2);
}
.acct-row:first-child { border-top: none; }
.acct-icon {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: var(--bg-2);
  display: grid; place-items: center;
  font-weight: 700;
  font-size: 13px;
  color: var(--ink);
  border: 1px solid var(--line);
}
.dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--good);
  margin-right: 6px;
}
.dot.warn { background: var(--warn); }
.dot.bad { background: var(--bad); }

/* Confidence ring */
.ring-wrap { display: flex; align-items: center; gap: 14px; }
.ring { position: relative; width: 72px; height: 72px; flex-shrink: 0; }
.ring svg { transform: rotate(-90deg); }
.ring .ringval {
  position: absolute; inset: 0;
  display: grid; place-items: center;
  font-family: var(--font-serif);
  font-size: 22px;
  letter-spacing: -0.02em;
}

/* Misc */
.divider { height: 1px; background: var(--line); width: 100%; }
.spacer-12 { height: 12px; }
.spacer-20 { height: 20px; }

/* Animation */
@keyframes pulse {
  0% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.03); opacity: 0.92; }
  100% { transform: scale(1); opacity: 1; }
}
.pulse { animation: pulse 0.6s ease; }

@keyframes flash {
  0% { background-color: oklch(from var(--good) l c h / 0.3); }
  100% { background-color: transparent; }
}
.flash { animation: flash 1s ease; }

@keyframes confetti {
  0% { transform: translateY(0) rotate(0); opacity: 1; }
  100% { transform: translateY(140px) rotate(360deg); opacity: 0; }
}
.confetti-piece {
  position: absolute;
  width: 8px; height: 14px;
  pointer-events: none;
  animation: confetti 1.4s ease-out forwards;
}

/* Scrollbar */
.canvas::-webkit-scrollbar, .rightpane::-webkit-scrollbar { width: 10px; }
.canvas::-webkit-scrollbar-thumb, .rightpane::-webkit-scrollbar-thumb {
  background: var(--line); border-radius: 5px; border: 2px solid var(--bg);
}

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--ink);
  color: var(--bg);
  padding: 12px 18px;
  border-radius: 10px;
  box-shadow: var(--shadow-md);
  font-size: 13px;
  z-index: 100;
  display: flex; align-items: center; gap: 10px;
  font-weight: 500;
}
.toast .ok-dot { width: 8px; height: 8px; border-radius: 50%; background: oklch(0.7 0.15 155); }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0;
  background: oklch(0 0 0 / 0.32);
  z-index: 50;
  display: grid; place-items: center;
  padding: 20px;
}
.modal {
  background: var(--surface);
  border-radius: 14px;
  padding: 28px;
  width: 480px;
  max-width: 100%;
  box-shadow: 0 20px 60px oklch(0 0 0 / 0.25);
}
.modal h3 { margin: 0 0 16px; font-family: var(--font-serif); font-size: 22px; letter-spacing: -0.01em; font-weight: 500; }
.modal .form-row { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
.modal label {
  font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--ink-4); font-weight: 600;
}
.modal input, .modal select {
  border: 1px solid var(--line);
  background: var(--surface);
  padding: 9px 11px;
  border-radius: 8px;
  font: inherit;
  color: var(--ink);
  font-size: 13.5px;
  outline: none;
  font-family: inherit;
}
.modal input:focus, .modal select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px oklch(from var(--accent) l c h / 0.15);
}

/* Active flip toggle */
.toggle-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 3px 9px;
  font-size: 11px;
  border-radius: 999px;
  font-weight: 500;
  background: var(--accent-soft);
  color: var(--accent);
}
</style>
</head>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((key, val) => {
    setValues((prev) => ({ ...prev, [key]: val }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

<script type="text/babel" data-presets="env,react">
// data.jsx — sample data + finance utilities

const SAMPLE_DEBTS = [
  { id: "d1", name: "Capital Card",   kind: "Credit Card",   balance: 8420,  apr: 24.99, min: 215, color: "oklch(0.6 0.18 28)",  initials: "CC" },

  { id: "d3", name: "Student Loan",   kind: "Student",       balance: 22800, apr: 5.25,  min: 246, color: "oklch(0.5 0.12 155)",  initials: "SL" },
  { id: "d4", name: "Store Card",     kind: "Credit Card",   balance: 1240,  apr: 27.99, min: 45,  color: "oklch(0.62 0.16 60)",  initials: "ST" },
  { id: "d5", name: "Personal Loan",  kind: "Personal",      balance: 6800,  apr: 11.5,  min: 175, color: "oklch(0.55 0.14 295)", initials: "PL" },
];

const SAMPLE_ACCOUNTS = [
  { id: "a1", inst: "Northbridge Federal", type: "Checking",   balance: 4280,  status: "ok",   icon: "N" },
  { id: "a2", inst: "Northbridge Federal", type: "Savings",    balance: 12640, status: "ok",   icon: "N" },
  { id: "a3", inst: "Capital Card",        type: "Credit Card",balance: -8420, status: "ok",   icon: "C" },
  { id: "a4", inst: "Atlas Auto Finance",  type: "Auto Loan",  balance: -14200,status: "ok",   icon: "A" },
  { id: "a5", inst: "Meridian Student",    type: "Student",    balance: -22800,status: "warn", icon: "M" },
  { id: "a6", inst: "Quoin Retirement",    type: "401(k)",     balance: 86400, status: "ok",   icon: "Q" },
];

const BADGE_DEFS = [
  { id: "first",   name: "First Payment",  desc: "Logged a payment",       achieved: true },
  { id: "snow",    name: "First Snowflake",desc: "Extra payment applied",  achieved: true },
  { id: "kill1",   name: "First Knockout", desc: "Closed a debt",          achieved: false },
  { id: "streak7", name: "7-Day Streak",   desc: "On-time, all week",      achieved: true },
  { id: "arch",    name: "Strategy Architect", desc: "Built a what-if",   achieved: true },
  { id: "sub5k",   name: "Sub-$5k Hero",   desc: "All debts under $5k",    achieved: false },
  { id: "halve",   name: "Halfway There",  desc: "50% of total paid",      achieved: false },
  { id: "zero",    name: "Debt-Free",      desc: "All zeros",              achieved: false },
];

// ── Finance ─────────────────────────────────────────────────────────────────
// Simulate month-by-month payoff. Returns array of {month, debts:{id:bal}, totalPaid, interestPaid}
function simulatePayoff(debts, strategy, extraPerMonth) {
  const ordered = orderDebts(debts, strategy);
  const work = ordered.map(d => ({ ...d }));
  const months = [];
  let m = 0;
  let totalInterest = 0;
  while (work.some(d => d.balance > 0.01) && m < 600) {
    let pool = extraPerMonth;
    // accrue interest
    for (const d of work) {
      if (d.balance <= 0) continue;
      const i = d.balance * (d.apr / 100) / 12;
      d.balance += i;
      totalInterest += i;
    }
    // pay minimums
    for (const d of work) {
      if (d.balance <= 0) continue;
      const pay = Math.min(d.balance, d.min);
      d.balance -= pay;
      // freed minimums roll into pool when paid off
    }
    // freed minimums become extra (snowball/avalanche rolls)
    for (const d of work) {
      if (d.balance <= 0.01) pool += d.min - (d._consumed ? 0 : 0);
    }
    // apply extra to target (first nonzero in ordered list)
    for (const d of work) {
      if (pool <= 0) break;
      if (d.balance <= 0.01) continue;
      const pay = Math.min(d.balance, pool);
      d.balance -= pay;
      pool -= pay;
    }
    m++;
    const snap = { month: m, totalRemaining: work.reduce((s, d) => s + Math.max(0, d.balance), 0), interestPaid: totalInterest };
    snap.debts = Object.fromEntries(work.map(d => [d.id, Math.max(0, d.balance)]));
    months.push(snap);
  }
  return { months, totalMonths: m, totalInterest };
}

function orderDebts(debts, strategy) {
  const arr = [...debts];
  if (strategy === "snowball") arr.sort((a, b) => a.balance - b.balance);
  else if (strategy === "avalanche") arr.sort((a, b) => b.apr - a.apr);
  // custom: keep array order
  return arr;
}

function fmtMoney(n, opts = {}) {
  const { decimals = 0, sign = false } = opts;
  if (n == null || isNaN(n)) return "—";
  const abs = Math.abs(n);
  const formatted = abs.toLocaleString("en-US", {
    minimumFractionDigits: decimals,
    maximumFractionDigits: decimals,
  });
  const s = (n < 0 ? "−" : sign && n > 0 ? "+" : "") + "$" + formatted;
  return s;
}
function fmtMonths(m) {
  if (m == null) return "—";
  const y = Math.floor(m / 12);
  const r = m % 12;
  if (y === 0) return `${r} mo`;
  if (r === 0) return `${y}y`;
  return `${y}y ${r}m`;
}
function monthLabel(offset, fromDate = new Date(2026, 3, 1)) {
  const d = new Date(fromDate);
  d.setMonth(d.getMonth() + offset);
  return d.toLocaleString("en-US", { month: "short", year: "2-digit" });
}

// ── Asset Flip math ─────────────────────────────────────────────────────────
function calcRetirementLoanCosts(loanAmount, ratePct, termYears, marketRate) {
  const totalInterest = loanAmount * (ratePct / 100) * termYears;
  const fv = loanAmount * Math.pow(1 + marketRate / 100, termYears);
  const leakage = Math.max(0, fv - (loanAmount + totalInterest));
  return { totalInterest, leakage };
}
function calcFlipNetProfit(purchase, sale, rehab, holdMonths) {
  const buying = purchase * 0.03;
  const selling = sale * 0.06;
  const monthlyHold = 600;
  const holdCost = monthlyHold * holdMonths;
  const gross = sale - purchase;
  return gross - rehab - buying - selling - holdCost;
}
function calcTaxDrag(interestPaid, currentTax, retireTax) {
  return interestPaid * (currentTax / 100) + interestPaid * (retireTax / 100);
}
function netStrategyGain({ loanAmount, loanRate, termYears, marketRate, purchase, sale, rehab, holdMonths, currentTax, retireTax }) {
  const ret = calcRetirementLoanCosts(loanAmount, loanRate, termYears, marketRate);
  const flip = calcFlipNetProfit(purchase, sale, rehab, holdMonths);
  const tax = calcTaxDrag(ret.totalInterest, currentTax, retireTax);
  const net = flip - ret.leakage - tax;
  return { net, flip, leakage: ret.leakage, tax, totalInterest: ret.totalInterest };
}

// IRS validation
function validate401kLoan(loanAmount, vested) {
  const cap = Math.min(50000, vested * 0.5);
  if (loanAmount > 50000) return { ok: false, level: "bad", msg: "Exceeds IRS $50,000 limit (Section 72(p))." };
  if (loanAmount > vested * 0.5) return { ok: false, level: "bad", msg: `Exceeds 50% of vested balance ($${cap.toLocaleString()}).` };
  if (loanAmount > cap * 0.85) return { ok: true, level: "warn", msg: `Approaching limit — only $${(cap-loanAmount).toLocaleString()} of headroom.` };
  return { ok: true, level: "ok", msg: "Within IRS Section 72(p) limits." };
}

// 70% rule
function validate70Rule(purchase, arv, rehab) {
  const max = arv * 0.70 - rehab;
  const ratio = (purchase + rehab) / arv;
  if (purchase > max && ratio > 0.85) return { ok: false, level: "bad", msg: `Margin under 15%. Purchase exceeds the 70% rule by ${fmtMoney(purchase - max)}.`, max };
  if (purchase > max) return { ok: true, level: "warn", msg: `Thin margin: ${((1 - ratio) * 100).toFixed(1)}% buffer below ARV. Standard rule is 30%.`, max };
  return { ok: true, level: "ok", msg: `Healthy margin: purchase ${fmtMoney(max - purchase)} under the 70% ceiling.`, max };
}

Object.assign(window, {

  simulatePayoff, orderDebts,
  fmtMoney, fmtMonths, monthLabel,
  netStrategyGain, calcRetirementLoanCosts, calcFlipNetProfit, calcTaxDrag,
  validate401kLoan, validate70Rule,
});

</script>

              <input type="range" min="0" max="2000" step="25" value={extraPay} onChange={e => setExtraPay(Number(e.target.value))}/>

              </div>

                <span className="tabular" style={{fontWeight:600}}>{monthsSaved >= 0 ? fmtMonths(monthsSaved) : "—"}</span>
              </div>
              <div className="between">
                <span style={{fontSize: 12.5, color:"var(--ink-3)"}}>Interest saved</span>
                <span className="tabular" style={{fontWeight:600, color:"var(--good)"}}>{fmtMoney(interestSaved)}</span>
              </div>

                <span style={{fontSize: 12.5, color:"var(--ink-3)"}}>Last payment</span>

          </div>

    </>

}

function Timeline({ debts, sim, ordered, totalMonths }) {
  const monthsToShow = Math.max(24, totalMonths);
  const ticks = useMemo(() => {
    const out = [];
    const step = monthsToShow > 60 ? 12 : 6;
    for (let m = 0; m < monthsToShow; m += step) out.push(m);
    return out;
  }, [monthsToShow]);

  return (
    <div>
      <div className="timeline-axis">
        {ticks.map((m,i) => <span key={i} className="tick">{monthLabel(m)}</span>)}
      </div>
      {ordered.map((d, idx) => {
        // find first month where this debt is paid off
        let paidMonth = sim.months.findIndex(s => (s.debts[d.id] || 0) <= 0.01);
        if (paidMonth === -1) paidMonth = sim.totalMonths;
        const widthPct = Math.min(100, (paidMonth / monthsToShow) * 100);
        const isTarget = idx === 0;
        return (
          <div key={d.id} className="tl-row">
            <div className="name">
              <span className="swatch" style={{background: d.color}}/>
              <span>{d.name}</span>
              <span className="meta">{fmtMoney(d.balance)}</span>
            </div>
            <div className={"tl-bar" + (isTarget ? " is-target":"")}>
              <div className="fill" style={{width: `${widthPct}%`}}/>
            </div>
            <div className="tl-pay">
              {paidMonth === sim.totalMonths ? "—" : `paid ${monthLabel(paidMonth)}`}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function ComparisonChart({ debts, extraPay }) {
  const aval = useMemo(() => simulatePayoff(debts, "avalanche", extraPay), [debts, extraPay]);
  const snow = useMemo(() => simulatePayoff(debts, "snowball", extraPay), [debts, extraPay]);
  const mins = useMemo(() => simulatePayoff(debts, "avalanche", 0), [debts]);
  const W = 800, H = 220, P = { l: 56, r: 16, t: 16, b: 28 };
  const maxMonths = Math.max(aval.totalMonths, snow.totalMonths, mins.totalMonths);
  const initial = debts.reduce((s,d)=>s+d.balance,0);
  const x = (m) => P.l + (m / maxMonths) * (W - P.l - P.r);
  const y = (v) => P.t + (1 - v / initial) * (H - P.t - P.b);

  const buildPath = (sim) => {
    let p = `M ${x(0)},${y(initial)}`;
    sim.months.forEach((s) => { p += ` L ${x(s.month)},${y(s.totalRemaining)}`; });
    return p;
  };

  const yTicks = [0, 0.25, 0.5, 0.75, 1];
  const xTicks = useMemo(() => {
    const step = maxMonths > 72 ? 24 : maxMonths > 36 ? 12 : 6;
    const arr = [];
    for (let m = 0; m <= maxMonths; m += step) arr.push(m);
    if (arr[arr.length-1] !== maxMonths) arr.push(maxMonths);
    return arr;
  }, [maxMonths]);

  return (
    <div className="chart">
      <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none">
        {yTicks.map((t,i) => (
          <g key={i}>
            <line x1={P.l} x2={W-P.r} y1={y(initial*t)} y2={y(initial*t)} stroke="var(--line-2)" strokeDasharray={i===0?"0":"3 3"}/>
            <text x={P.l-8} y={y(initial*t)+3.5} textAnchor="end" fontSize="10" fill="var(--ink-4)" fontFamily="var(--font-mono)">
              {t === 0 ? "$0" : `$${Math.round(initial*t/1000)}k`}
            </text>
          </g>
        ))}
        {xTicks.map((m,i) => (
          <g key={i}>
            <line x1={x(m)} x2={x(m)} y1={H-P.b} y2={H-P.b+4} stroke="var(--ink-4)"/>
            <text x={x(m)} y={H-P.b+16} textAnchor="middle" fontSize="10" fill="var(--ink-4)" fontFamily="var(--font-mono)">{monthLabel(m)}</text>
          </g>
        ))}
        <path d={buildPath(mins)} fill="none" stroke="var(--ink-3)" strokeWidth="1.5" strokeDasharray="4 3"/>
        <path d={buildPath(snow)} fill="none" stroke="var(--warn)" strokeWidth="2"/>
        <path d={buildPath(aval)} fill="none" stroke="var(--accent)" strokeWidth="2.5"/>
        {/* end markers */}
        <circle cx={x(aval.totalMonths)} cy={y(0)} r="4" fill="var(--accent)"/>
        <circle cx={x(snow.totalMonths)} cy={y(0)} r="3.5" fill="var(--warn)"/>
      </svg>
    </div>
  );
}

function RoadmapRightPane({ debts, strategy, extraPay, openLog, logPayment, badges, streak }) {
  const ordered = orderDebts(debts, strategy);
  const target = ordered.find(d => d.balance > 0);
  const startBal = 12000; // arbitrary starting reference for target

            <div className="between" style={{marginBottom: 6}}>

            <button className="btn primary" style={{width: "100%", marginTop: 14, justifyContent:"center"}} onClick={openLog}>
              <I.Plus size={14}/> Log a payment

          </>
        ) : (
          <div style={{textAlign:"center", padding: "24px 0"}}>
            <I.Trophy size={28}/>

      </div>

      <div className="card">
        <div className="between" style={{marginBottom: 14}}>
          <span className="h-eyebrow">Streak</span>
          <span className="tabular" style={{fontSize: 12, color: "var(--ink-3)"}}>{streak} weeks</span>
        </div>
        <div className="row" style={{gap: 12}}>
          <div style={{width:36, height:36, borderRadius: 10, background: "var(--warn-soft)", color: "var(--warn)", display:"grid", placeItems:"center"}}>
            <I.Flame size={18}/>
          </div>
          <div>
            <div className="serif" style={{fontSize: 22, letterSpacing:"-0.01em", lineHeight: 1}}>{streak}-week streak</div>
            <div className="muted" style={{fontSize: 12}}>Keep going — next mission unlocks at 12.</div>
          </div>
        </div>
        <div className="streak-dots" style={{marginTop: 14}}>
          {Array.from({length: 14}).map((_,i) => (
            <i key={i} className={i < streak ? "on" : i === streak ? "today" : ""}/>
          ))}
        </div>
      </div>

      <div className="card">
        <div className="between" style={{marginBottom: 14}}>
          <span className="h-eyebrow">Achievements</span>
          <span style={{fontSize: 11, color:"var(--ink-4)"}}>{badges.filter(b=>b.achieved).length}/{badges.length}</span>
        </div>
        <div className="badges">
          {badges.map(b => (
            <div key={b.id} className={"badge-card" + (b.achieved ? "" : " locked")}>
              <div className="ico-lg">{b.achieved ? <I.Trophy size={18}/> : <I.Lock size={14}/>}</div>
              <div className="nm">{b.name}</div>
              <div className="ds">{b.desc}</div>
            </div>
          ))}
        </div>
      </div>

      <div className="card flat" style={{background:"var(--bg)", border:"1px dashed var(--line)"}}>
        <div className="row" style={{alignItems:"flex-start", gap: 10}}>
          <div style={{width:28, height:28, borderRadius: 8, background: "var(--accent-soft)", color: "var(--accent)", display:"grid", placeItems:"center", flexShrink: 0}}>
            <I.Spark size={14}/>
          </div>
          <div>
            <div style={{fontSize: 12.5, fontWeight: 600}}>Tip</div>
            <div className="muted" style={{fontSize: 12.5, marginTop: 2}}>
              Round up your auto-pay by $25 a month — for {target?.name || "this debt"}, that pulls the payoff date in by ~3 months.
            </div>
          </div>
        </div>
      </div>
    </>
  );
}

Object.assign(window, { RoadmapTab, RoadmapRightPane, Timeline, ComparisonChart });

</script>
<script type="text/babel" data-presets="env,react">
// inventory.jsx — Inventory tab: editable table with drag-rank

function InventoryTab({ debts, setDebts, strategy, setStrategy, openAdd, removeDebt, updateDebt }) {
  const ordered = orderDebts(debts, strategy);
  const targetId = ordered.find(d => d.balance > 0)?.id;
  const totalBalance = debts.reduce((s,d)=>s+d.balance, 0);
  const totalMin = debts.reduce((s,d)=>s+d.min, 0);
  const weightedApr = debts.reduce((s,d)=>s+d.apr*d.balance,0) / Math.max(1,totalBalance);

  const dragId = useRef(null);
  const [dragOverId, setDragOverId] = useState(null);

  const onDragStart = (id) => (e) => {
    if (strategy !== "custom") return;
    dragId.current = id;
    e.dataTransfer.effectAllowed = "move";
  };
  const onDragOver = (id) => (e) => {
    if (strategy !== "custom") return;
    e.preventDefault();
    setDragOverId(id);
  };
  const onDrop = (id) => (e) => {
    if (strategy !== "custom") return;
    e.preventDefault();
    const from = dragId.current;
    if (!from || from === id) { setDragOverId(null); return; }
    const fromIdx = debts.findIndex(d => d.id === from);
    const toIdx = debts.findIndex(d => d.id === id);
    const next = [...debts];
    const [moved] = next.splice(fromIdx, 1);
    next.splice(toIdx, 0, moved);
    setDebts(next);
    setDragOverId(null);
    dragId.current = null;
  };

  return (
    <>
      <section className="grid-4">
        <div className="card flat" style={{background:"var(--bg-2)", padding: 16}}>
          <div className="h-eyebrow">Total balance</div>
          <div className="serif" style={{fontSize: 26, letterSpacing:"-0.02em", marginTop: 4}}>{fmtMoney(totalBalance)}</div>
          <div className="muted" style={{fontSize: 12, marginTop: 4}}>{debts.length} active debts</div>
        </div>
        <div className="card flat" style={{background:"var(--bg-2)", padding: 16}}>
          <div className="h-eyebrow">Min payments</div>
          <div className="serif" style={{fontSize: 26, letterSpacing:"-0.02em", marginTop: 4}}>{fmtMoney(totalMin)}<small style={{fontSize: 14, color:"var(--ink-3)"}}>/mo</small></div>
          <div className="muted" style={{fontSize: 12, marginTop: 4}}>Auto-paid on the 1st</div>
        </div>
        <div className="card flat" style={{background:"var(--bg-2)", padding: 16}}>
          <div className="h-eyebrow">Avg. APR (weighted)</div>
          <div className="serif" style={{fontSize: 26, letterSpacing:"-0.02em", marginTop: 4}}>{weightedApr.toFixed(2)}<small style={{fontSize: 14, color:"var(--ink-3)"}}>%</small></div>
          <div className="muted" style={{fontSize: 12, marginTop: 4}}>Rate-shopping could lower this</div>
        </div>
        <div className="card flat" style={{background:"var(--bg-2)", padding: 16}}>
          <div className="h-eyebrow">Highest rate</div>
          <div className="serif" style={{fontSize: 26, letterSpacing:"-0.02em", marginTop: 4, color:"var(--bad)"}}>
            {Math.max(...debts.map(d=>d.apr)).toFixed(2)}<small style={{fontSize:14, color:"var(--ink-3)"}}>%</small>
          </div>
          <div className="muted" style={{fontSize: 12, marginTop: 4}}>Avalanche flags this first</div>
        </div>
      </section>

      <section className="card" style={{padding: 0, overflow:"hidden"}}>
        <div className="between" style={{padding: "var(--pad)"}}>
          <div>
            <h2 className="h-section">Debt inventory</h2>
            <div className="muted" style={{fontSize: 12.5, marginTop: 2}}>
              {strategy === "custom"
                ? "Drag rows to set your custom payoff order."
                : strategy === "snowball"
                  ? "Snowball ranks by smallest balance first."
                  : "Avalanche ranks by highest APR first."}
            </div>
          </div>
          <div className="row" style={{gap: 8}}>
            <StrategyToggle value={strategy} onChange={setStrategy}/>
            <button className="btn primary" onClick={openAdd}><I.Plus size={14}/> Add debt</button>
          </div>
        </div>
        <table className="tbl">
          <thead>
            <tr>
              <th style={{width: 40}}></th>
              <th style={{width: 32}}>#</th>
              <th>Creditor</th>
              <th className="num">Balance</th>
              <th className="num">APR</th>
              <th className="num">Min</th>
              <th>Status</th>
              <th style={{width: 70}}></th>
            </tr>
          </thead>
          <tbody>
            {ordered.map((d, i) => (
              <tr key={d.id}
                  className={(dragOverId === d.id ? " drag-over" : "") + (d.id === targetId ? " target-row" : "")}
                  draggable={strategy === "custom"}
                  onDragStart={onDragStart(d.id)}
                  onDragOver={onDragOver(d.id)}
                  onDrop={onDrop(d.id)}>
                <td><span className="grip" style={{opacity: strategy === "custom" ? 1 : 0.3}}><I.Drag size={14}/></span></td>
                <td className="tabular muted">{String(i+1).padStart(2,"0")}</td>
                <td>
                  <div className="creditor">
                    <div className="swatch-icon" style={{background: `oklch(from ${d.color} l c h / 0.18)`, color: d.color}}>
                      {d.initials}
                    </div>
                    <div>
                      <div style={{fontWeight: 500}}>{d.name}</div>
                      <div className="muted" style={{fontSize: 11.5}}>{d.kind}</div>
                    </div>
                  </div>
                </td>
                <td className="num">
                  <input className="cell-input" type="number" value={Math.round(d.balance)}
                         onChange={e => updateDebt(d.id, { balance: Number(e.target.value) || 0 })}/>
                </td>
                <td className="num">
                  <input className="cell-input" type="number" step="0.01" value={d.apr}
                         onChange={e => updateDebt(d.id, { apr: Number(e.target.value) || 0 })}/>
                </td>
                <td className="num">
                  <input className="cell-input" type="number" value={d.min}
                         onChange={e => updateDebt(d.id, { min: Number(e.target.value) || 0 })}/>
                </td>
                <td>
                  {d.id === targetId
                    ? <span className="pill target"><I.Bolt size={10}/> Target</span>
                    : d.apr >= 20
                      ? <span className="pill warn">High rate</span>
                      : <span className="pill">Tracking</span>}
                </td>
                <td>
                  <button className="btn ghost sm" title="Remove" onClick={() => removeDebt(d.id)}><I.Trash size={14}/></button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </section>

      {/* Heat map */}
      <section className="card">
        <div className="between" style={{marginBottom: 12}}>
          <h2 className="h-section">Interest heat map</h2>
          <div className="muted" style={{fontSize: 12.5}}>Annual interest cost at current balance — bigger blocks bleed more cash.</div>
        </div>
        <HeatMap debts={debts}/>
      </section>
    </>
  );
}

function StrategyToggle({ value, onChange }) {
  const opts = [
    { id: "snowball", label: "Snowball" },
    { id: "avalanche", label: "Avalanche" },
    { id: "custom", label: "Custom" },
  ];
  return (
    <div style={{display:"flex", padding: 2, background: "var(--bg-2)", border: "1px solid var(--line)", borderRadius: 9, gap: 2}}>
      {opts.map(o => (
        <button key={o.id} className="btn ghost sm"
                style={{
                  background: value === o.id ? "var(--surface)" : "transparent",
                  boxShadow: value === o.id ? "var(--shadow-sm)" : "none",
                  color: value === o.id ? "var(--ink)" : "var(--ink-3)",
                  fontWeight: 500,
                  padding: "5px 11px",
                }}
                onClick={() => onChange(o.id)}>
          {o.label}
        </button>
      ))}
    </div>
  );
}

function HeatMap({ debts }) {
  const data = debts.map(d => ({ ...d, cost: d.balance * d.apr / 100 }))
                    .sort((a,b) => b.cost - a.cost);
  const total = data.reduce((s,d)=>s+d.cost, 0);
  return (
    <div style={{display:"grid", gridTemplateColumns: "repeat(12, 1fr)", gap: 6, gridAutoRows: 60}}>
      {data.map((d) => {
        const span = Math.max(2, Math.round((d.cost/total) * 12));
        return (
          <div key={d.id}
               style={{
                 gridColumn: `span ${span}`,
                 background: `oklch(from ${d.color} l c h / 0.16)`,
                 border: `1px solid oklch(from ${d.color} l c h / 0.4)`,
                 borderRadius: 10,
                 padding: 10,
                 display:"flex", flexDirection:"column", justifyContent:"space-between",
                 minHeight: 110,
                 gridRow: span > 6 ? "span 2" : "span 1",
               }}>
            <div style={{fontSize: 11.5, fontWeight: 600, color: d.color}}>{d.name}</div>
            <div>
              <div className="serif" style={{fontSize: 22, letterSpacing:"-0.02em", color: d.color, lineHeight: 1}}>
                {fmtMoney(d.cost, {decimals: 0})}
              </div>
              <div style={{fontSize: 11, color: "var(--ink-3)", marginTop: 2}}>
                /yr · {d.apr.toFixed(2)}% APR
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function InventoryRightPane({ debts }) {
  const sorted = [...debts].sort((a,b)=>b.apr-a.apr);
  const highest = sorted[0];
  const smallest = [...debts].sort((a,b)=>a.balance-b.balance)[0];
  return (
    <>
      <div className="card">
        <span className="h-eyebrow">Strategy preview</span>
        <div className="col" style={{marginTop: 12, gap: 10}}>
          <div className="card flat" style={{background: "var(--bg-2)", padding: 12, borderRadius: 10}}>
            <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", gap: 8}}>
              <div className="row" style={{gap: 8, minWidth: 0}}>
                <I.Snow size={14}/>
                <span style={{fontSize: 13, fontWeight: 600}}>Snowball</span>
              </div>
              <span className="tabular muted" style={{fontSize: 11, whiteSpace:"nowrap", flexShrink: 0}}>quick wins</span>
            </div>
            <div className="muted" style={{fontSize: 12, marginTop: 4}}>
              Hit <b style={{color:"var(--ink)"}}>{smallest?.name}</b> first — only {fmtMoney(smallest?.balance)}.
            </div>
          </div>
          <div className="card flat" style={{background: "var(--bg-2)", padding: 12, borderRadius: 10}}>
            <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", gap: 8}}>
              <div className="row" style={{gap: 8, minWidth: 0}}>
                <I.Drop size={14}/>
                <span style={{fontSize: 13, fontWeight: 600}}>Avalanche</span>
              </div>
              <span className="tabular muted" style={{fontSize: 11, whiteSpace:"nowrap", flexShrink: 0}}>save most</span>
            </div>
            <div className="muted" style={{fontSize: 12, marginTop: 4}}>
              Crush <b style={{color:"var(--ink)"}}>{highest?.name}</b> at {highest?.apr.toFixed(2)}% APR.
            </div>
          </div>
        </div>
      </div>

      <div className="card">
        <span className="h-eyebrow">Quick actions</span>
        <div className="col" style={{marginTop: 12, gap: 8}}>
          <button className="btn"><I.Refresh size={14}/> Refresh balances</button>
          <button className="btn"><I.Link size={14}/> Connect new account</button>
          <button className="btn"><I.Calendar size={14}/> Set due-date alerts</button>
        </div>
      </div>

      <div className="card flat" style={{background: "var(--accent-soft)", border: "none"}}>
        <div className="row" style={{gap: 10, alignItems:"flex-start"}}>
          <I.Spark size={16}/>
          <div>
            <div style={{fontWeight: 600, fontSize: 13}}>Negotiation tip</div>
            <div className="muted" style={{fontSize: 12.5, marginTop: 4, color:"var(--ink-2)"}}>
              Cardholders who phone in score lower APRs roughly half the time. A 4-point cut on {highest?.name} alone saves ~{fmtMoney(highest?.balance * 0.04)}/yr.
            </div>
          </div>
        </div>
      </div>
    </>
  );
}

Object.assign(window, { InventoryTab, InventoryRightPane, StrategyToggle, HeatMap });

</script>

// ASSET FLIP SIMULATOR (deep, capital strategy)
// ════════════════════════════════════════════════════════════════════════
function FlipSimulator({ flipState, setFlip }) {
  const f = flipState;
  const validation401k = validate401kLoan(f.loanAmount, f.vestedBalance);
  const rule70 = validate70Rule(f.purchase, f.arv, f.rehab);
  const result = netStrategyGain({
    loanAmount: f.loanAmount, loanRate: f.loanRate, termYears: f.termYears,
    marketRate: f.marketRate, purchase: f.purchase, sale: f.arv, rehab: f.rehab,
    holdMonths: f.holdMonths, currentTax: f.currentTax, retireTax: f.retireTax
  });
  const isViable = result.net > 0;

  return (
    <>
      <section className="hero" style={{gridTemplateColumns: "1fr 1fr"}}>
        <div className="hero-l" style={{background: isViable ? "var(--ink)" : "oklch(0.28 0.08 25)"}}>
          <span className="eye">Net Strategy Gain</span>
          <div className="num" style={{color: isViable ? "oklch(0.85 0.12 155)" : "oklch(0.85 0.15 25)"}}>
            {result.net >= 0 ? "+" : "−"}{fmtMoney(Math.abs(result.net))}
          </div>
          <span className="delta" style={{
            background: isViable ? "oklch(0.85 0.12 155 / 0.12)" : "oklch(0.85 0.15 25 / 0.15)",
            color: isViable ? "oklch(0.85 0.12 155)" : "oklch(0.85 0.15 25)",
          }}>
            {isViable ? <><I.Check size={11}/> Strategy is mathematically sound</> : <><I.Warning size={11}/> Standard payoff beats this strategy</>}
          </span>
          <div style={{fontSize: 12.5, color: "oklch(1 0 0 / 0.6)", marginTop: 4, lineHeight: 1.5}}>
            {isViable
              ? "After accounting for opportunity cost, hidden fees, and double-tax drag, the flip still nets a real surplus."
              : "Frictional costs, lost compound growth, and tax drag eat the projected profit."}
          </div>
        </div>
        <div className="hero-r" style={{padding: "var(--pad)", display:"grid", gridTemplateColumns:"1fr 1fr", gap: 16, alignContent:"center"}}>
          <div className="kpi">
            <span className="lbl">Flip net profit</span>
            <span className="val">{fmtMoney(result.flip)}</span>
            <span className="sub">after buy/hold/sell fees</span>
          </div>
          <div className="kpi">
            <span className="lbl">401(k) leakage</span>
            <span className="val" style={{color:"var(--bad)"}}>−{fmtMoney(result.leakage)}</span>
            <span className="sub">growth foregone</span>
          </div>
          <div className="kpi">
            <span className="lbl">Tax drag</span>
            <span className="val" style={{color:"var(--bad)"}}>−{fmtMoney(result.tax)}</span>
            <span className="sub">double-taxation</span>
          </div>
          <div className="kpi">
            <span className="lbl">Time horizon</span>
            <span className="val">{f.holdMonths}<small style={{fontSize:14, color:"var(--ink-3)"}}>mo</small></span>
            <span className="sub">acquisition → sale</span>
          </div>
        </div>
      </section>

      <section className="grid-2">
        <RiskCard validation={validation401k} title="IRS Compliance · Section 72(p)"
                  detail={`Loan ${fmtMoney(f.loanAmount)} against ${fmtMoney(f.vestedBalance)} vested. Cap is the lesser of $50,000 or 50% of vested balance.`}/>
        <RiskCard validation={rule70} title="The 70% Rule"
                  detail={`Max allowable offer = ARV × 70% − Rehab = ${fmtMoney(rule70.max)}. You're at ${fmtMoney(f.purchase)}.`}/>
      </section>

      <section className="grid-2">
        <div className="card">
          <div className="between" style={{marginBottom: 14, gap: 10, flexWrap: "wrap"}}>
            <h2 className="h-section" style={{whiteSpace: "nowrap"}}>Retirement loan</h2>
            <span className="toggle-pill" style={{background:"var(--warn-soft)", color:"oklch(0.4 0.12 75)", whiteSpace: "nowrap"}}>
              <I.Warning size={11}/> Termination clock
            </span>
          </div>
          <div className="col" style={{gap: 16}}>
            <FlipSlider label="Loan amount" value={f.loanAmount} min={5000} max={75000} step={500}
                       fmt={fmtMoney} onChange={v => setFlip("loanAmount", v)} ceiling={50000}/>
            <FlipSlider label="Loan rate (Prime + 1.5%)" value={f.loanRate} min={3} max={12} step={0.25}
                       fmt={v => `${v.toFixed(2)}%`} onChange={v => setFlip("loanRate", v)}/>
            <FlipSlider label="Term" value={f.termYears} min={1} max={5} step={1}
                       fmt={v => `${v}y`} onChange={v => setFlip("termYears", v)} ceiling={5}/>
            <FlipSlider label="Vested balance" value={f.vestedBalance} min={20000} max={250000} step={5000}
                       fmt={fmtMoney} onChange={v => setFlip("vestedBalance", v)}/>
          </div>
        </div>
        <div className="card">
          <h2 className="h-section" style={{marginBottom: 14}}>The flip</h2>
          <div className="col" style={{gap: 16}}>
            <FlipSlider label="Purchase price" value={f.purchase} min={50000} max={400000} step={5000}
                       fmt={fmtMoney} onChange={v => setFlip("purchase", v)}/>
            <FlipSlider label="Rehab budget" value={f.rehab} min={5000} max={150000} step={1000}
                       fmt={fmtMoney} onChange={v => setFlip("rehab", v)}/>
            <FlipSlider label="After Repair Value (ARV)" value={f.arv} min={80000} max={600000} step={5000}
                       fmt={fmtMoney} onChange={v => setFlip("arv", v)}/>
            <FlipSlider label="Months to sale" value={f.holdMonths} min={1} max={14} step={1}
                       fmt={v => `${v} mo`} onChange={v => setFlip("holdMonths", v)} warnAbove={9} warnBelow={3}/>
          </div>
        </div>
      </section>

      <section className="card">
        <h2 className="h-section" style={{marginBottom: 4}}>Standard payoff vs. Asset Flip</h2>
        <div className="muted" style={{fontSize: 12.5, marginBottom: 18}}>
          Side-by-side projection. The flip surplus, if positive, gets applied as a snowflake.
        </div>
        <FlipComparison flipState={f} result={result} isViable={isViable}/>
      </section>

      <section className="card">
        <h2 className="h-section" style={{marginBottom: 14}}>Strategy friction</h2>
        <FrictionBreakdown flipState={f} result={result}/>
      </section>
    </>
  );
}

function FlipSlider({ label, value, min, max, step, fmt, onChange, ceiling, warnAbove, warnBelow }) {
  const overCap = ceiling != null && value > ceiling;
  const tooHigh = warnAbove != null && value > warnAbove;
  const tooLow = warnBelow != null && value < warnBelow;
  const flag = overCap || tooHigh || tooLow;
  return (
    <div>
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", gap: 12, marginBottom: 8}}>
        <span style={{fontSize: 12.5, color:"var(--ink-2)", fontWeight: 500, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis", minWidth: 0, flex: 1}}>{label}</span>
        <span className="tabular" style={{
          fontSize: 14, fontWeight: 600, whiteSpace:"nowrap", flexShrink: 0,
          color: overCap ? "var(--bad)" : flag ? "oklch(0.5 0.13 75)" : "var(--ink)"
        }}>
          {fmt(value)} {overCap && <I.Warning size={12}/>}
        </span>
      </div>
      <input type="range" min={min} max={max} step={step} value={value}
             className="flip-slider"
             onChange={e => onChange(Number(e.target.value))}
             style={{
               appearance:"none", width:"100%", height: 4, borderRadius: 999,
               background: `linear-gradient(90deg, var(--accent) ${((value-min)/(max-min))*100}%, var(--line-2) ${((value-min)/(max-min))*100}%)`,
               outline:"none", cursor:"pointer",
             }}/>
      {ceiling != null && (
        <div style={{position:"relative", height: 0}}>
          <div style={{position:"absolute", left: `${((ceiling - min)/(max - min))*100}%`, top: -10, width: 1, height: 10, background:"var(--bad)", marginLeft: -0.5}}/>
        </div>
      )}
    </div>
  );
}

function RiskCard({ validation, title, detail }) {
  const tone = validation.level === "bad" ? "bad" : validation.level === "warn" ? "warn" : "ok";
  const sym = validation.level === "bad" ? "!" : validation.level === "warn" ? "!" : "✓";
  return (
    <div className={`risk-card ${tone}`}>
      <div className="ind">{sym}</div>
      <div style={{flex: 1}}>
        <div className="ttl">{title}</div>
        <div className="desc">{validation.msg}</div>
        <div className="muted" style={{fontSize: 11.5, marginTop: 12, lineHeight: 1.5, display: "block"}}>{detail}</div>
      </div>
    </div>
  );
}

function FlipComparison({ flipState, result, isViable }) {
  const standardInterest = 8400;
  const data = [
    { label: "Standard Avalanche", value: -standardInterest, color: "var(--ink-3)" },
    { label: "Asset Flip strategy", value: result.net, color: isViable ? "var(--good)" : "var(--bad)" },
  ];
  const max = Math.max(...data.map(d => Math.abs(d.value)), 5000);
  return (
    <div style={{display:"grid", gridTemplateColumns: "1fr", gap: 14}}>
      {data.map((d, i) => {
        const widthPct = (Math.abs(d.value) / max) * 100;
        return (
          <div key={i} style={{display:"grid", gridTemplateColumns: "180px 1fr 120px", alignItems:"center", gap: 14}}>
            <div style={{fontSize: 13, fontWeight: 500}}>{d.label}</div>
            <div style={{position:"relative", height: 28, background:"var(--bg-2)", borderRadius: 6}}>
              <div style={{
                position:"absolute", left: 0, top: 0, bottom: 0,
                width: `${widthPct}%`,
                background: d.color, borderRadius: 6,
                display:"flex", alignItems:"center", justifyContent:"flex-end",
                padding: "0 10px", color:"#fff", fontSize: 11.5, fontWeight: 600,
              }}>
                {widthPct > 25 ? `${d.value < 0 ? "−" : "+"}${fmtMoney(Math.abs(d.value))}` : ""}
              </div>
            </div>
            <div className="tabular" style={{fontWeight: 600, color: d.value < 0 ? "var(--bad)" : "var(--good)"}}>
              {d.value < 0 ? "−" : "+"}{fmtMoney(Math.abs(d.value))}
            </div>
          </div>
        );
      })}
      <div className="muted" style={{fontSize: 12, marginTop: 6, paddingTop: 12, borderTop: "1px solid var(--line-2)"}}>
        Standard Avalanche figure assumes the existing crushing fund without taking a 401(k) loan.
      </div>
    </div>
  );
}

function FrictionBreakdown({ flipState: f, result }) {
  const items = [
    { label: "Acquisition closing costs", value: f.purchase * 0.03, hint: "~3% of purchase price" },
    { label: "Holding costs", value: 600 * f.holdMonths, hint: `${f.holdMonths} months × $600 (taxes, insurance, utilities)` },
    { label: "Selling commission", value: f.arv * 0.06, hint: "6% agent fee · NJ Realty Transfer Fee not shown" },
    { label: "401(k) loan interest leakage", value: result.leakage, hint: "Compound growth foregone vs. 7% market" },
    { label: "Double-taxation drag", value: result.tax, hint: "Interest paid with after-tax dollars, taxed again at withdrawal" },
    { label: "Plan admin fees", value: 75 + 35 * f.termYears, hint: "$75 origination + $35/yr maintenance" },
  ];
  const total = items.reduce((s, x) => s + x.value, 0);
  return (
    <div className="col" style={{gap: 0}}>
      {items.map((x, i) => (
        <div key={i} style={{display:"grid", gridTemplateColumns:"1fr 120px", alignItems:"center", padding:"10px 0", borderTop: i ? "1px solid var(--line-2)" : "none"}}>
          <div>
            <div style={{fontSize: 13, fontWeight: 500}}>{x.label}</div>
            <div className="muted" style={{fontSize: 11.5, marginTop: 1}}>{x.hint}</div>
          </div>
          <div className="tabular" style={{textAlign:"right", fontWeight: 600, color: "var(--bad)"}}>−{fmtMoney(x.value)}</div>
        </div>
      ))}
      <div style={{display:"grid", gridTemplateColumns:"1fr 120px", padding: "14px 0 0", borderTop: "1px solid var(--line)", marginTop: 6, alignItems:"center"}}>
        <div className="serif" style={{fontSize: 18}}>Total frictional cost</div>
        <div className="tabular" style={{textAlign:"right", fontSize: 18, fontWeight: 600, color: "var(--bad)", fontFamily:"var(--font-serif)", letterSpacing:"-0.01em"}}>−{fmtMoney(total)}</div>
      </div>
    </div>
  );
}

      { k: "weeksOn", label: "Weeks to clear", min: 2, max: 16, step: 1, fmt: v => `${v} wk` },
    ],
    expenses: (s) => {
      const sold = s.items * (s.sellThrough / 100);
      const shipping = sold * 4.50 * 0.6; // 60% shipped
      const supplies = sold * 0.85;
      return [
        { label: "Shipping (paid by you)", value: shipping, hint: `${(sold*0.6).toFixed(0)} shipped × $4.50` },
        { label: "Packing supplies",       value: supplies, hint: "Boxes, tape, labels ($0.85/item)" },
      ];
    },
    risks: [
      { tone: "ok",   title: "Zero downside", desc: "You already own the items. Worst case: you keep them.", level: "ok" },
      { tone: "ok",   title: "1099-K threshold", desc: "If you exceed $5,000 across platforms in 2026, expect a 1099-K. Hobby-loss rules apply if not a business.", level: "warn" },
    ],
    quickRefs: [
      { label: "Avg household resellable", value: "$1,200–$3,500" },
      { label: "Best categories", value: "Brand-name clothes, tech, books" },
      { label: "Timing", value: "Sun evenings drive most views" },
    ],
  },
};

function calcHustle(sid, s) {
  const cfg = HUSTLE_CONFIG[sid];
  let gross = 0;
  if (sid === "rideshare") gross = s.hoursPerWeek * s.hourlyGross * s.weeksOn;
  if (sid === "delivery")  gross = s.hoursPerWeek * s.deliveriesPerHour * s.payPerDelivery * s.weeksOn;
  if (sid === "freelance") gross = s.billableHours * s.rate * s.weeksOn * (1 - s.platformCut/100);
  if (sid === "sell")      gross = s.items * s.avgPrice * (s.sellThrough/100) * (1 - s.platform/100);
  const expenses = cfg.expenses(s);
  const totalExpenses = expenses.reduce((a,b) => a + b.value, 0);
  const grossHours = sid === "freelance" ? s.billableHours * s.weeksOn :
                     sid === "sell" ? s.items * 0.4 :
                     s.hoursPerWeek * s.weeksOn;
  // Self-employment / 1099 reserve (varies)
  const reservePct = sid === "freelance" ? 27 : sid === "sell" ? 0 : 15.3;
  const taxReserve = Math.max(0, gross - totalExpenses) * (reservePct/100);
  const net = gross - totalExpenses - taxReserve;
  const horizonWeeks = (sid === "freelance" ? s.weeksOn + (s.rampWeeks||0) : s.weeksOn) || 4;
  const monthly = net / (horizonWeeks / 4.33);
  return { gross, expenses, totalExpenses, taxReserve, reservePct, net, hours: grossHours, hourlyNet: net / Math.max(1, grossHours), horizonWeeks, monthly };
}

function SimulatorRightPane({ flipState, simStrategy, hustleState, debts, snowflakes, scheduleSnowflake }) {
  const sid = simStrategy || "flip";

  return <HustleRightPane sid={sid} state={hustleState[sid]} debts={debts} snowflakes={snowflakes} scheduleSnowflake={scheduleSnowflake}/>;
}

function FlipRightPane({ flipState, debts, snowflakes, scheduleSnowflake }) {
  const f = flipState;
  const validation401k = validate401kLoan(f.loanAmount, f.vestedBalance);
  const rule70 = validate70Rule(f.purchase, f.arv, f.rehab);
  const result = netStrategyGain({
    loanAmount: f.loanAmount, loanRate: f.loanRate, termYears: f.termYears,
    marketRate: f.marketRate, purchase: f.purchase, sale: f.arv, rehab: f.rehab,
    holdMonths: f.holdMonths, currentTax: f.currentTax, retireTax: f.retireTax
  });
  const isViable = result.net > 0;
  let confidence = 70;
  if (validation401k.level === "bad") confidence -= 35;
  else if (validation401k.level === "warn") confidence -= 10;
  if (rule70.level === "bad") confidence -= 25;
  else if (rule70.level === "warn") confidence -= 12;
  if (f.holdMonths < 3) confidence -= 8;
  if (f.holdMonths > 8) confidence -= 5;
  if (isViable) confidence += 10;
  confidence = Math.max(5, Math.min(95, confidence));

  return (
    <>
      <div className="card">
        <span className="h-eyebrow">Confidence</span>
        <div className="ring-wrap" style={{marginTop: 14}}>
